<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="256" cy="220" r="80" fill="none" stroke="url(#g)" stroke-width="32" filter="url(#glow)" opacity=".9"/>
  <circle cx="256" cy="220" r="40" fill="url(#g)" opacity=".8"/>
  <rect x="176" y="320" width="160" height="12" rx="6" fill="url(#g)" opacity=".5"/>
  <rect x="196" y="348" width="120" height="12" rx="6" fill="url(#g)" opacity=".25"/>
</svg>
