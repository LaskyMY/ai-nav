<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI Center</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🧠</text></svg>">
<style>
:root{--bg:#12121A;--card:#1A1A24;--accent:#7C3AED;--accent2:#059669;--accent3:#DC2626;--pink:#EC4899;--cyan:#06B6D4;--amber:#D97706;--text:#F1F1F6;--text2:#9494AA;--text3:#5C5C70;--muted:#5C5C70}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#12121A;color:#F1F1F6;font-size:15px;line-height:1.6;min-height:100vh;padding-bottom:66px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px}
::selection{background:rgba(139,91,246,.25)}

/* Splash - simple */
.splash{position:fixed;inset:0;z-index:9999;background:#12121A;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity .5s;pointer-events:none}
.splash.hide{opacity:0}
.splash-icon{font-size:44px;margin-bottom:12px;animation:spPop .5s forwards}
.splash-title{font-size:22px;font-weight:700;letter-spacing:-.04em;animation:spIn .5s .2s both}
.splash-sub{font-size:12px;color:#9494AA;margin-top:6px;animation:spIn .5s .4s both}
@keyframes spPop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes spIn{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}

/* Header */
header{position:sticky;top:0;z-index:50;background:rgba(8,8,15,.65);border-bottom:1px solid rgba(255,255,255,.03);padding:10px 18px}
.hdr{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:10px}
.logo{font-size:17px;font-weight:700;display:flex;align-items:center;gap:6px;white-space:nowrap}
.srch{flex:1;position:relative;min-width:60px}
.srch input{width:100%;padding:7px 12px 7px 30px;border-radius:8px;border:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.03);color:#F1F1F6;font-size:13px;outline:none;font-family:inherit}
.srch input:focus{border-color:rgba(124,58,237,.2)}
.srch input::placeholder{color:#5C5C70}
.srch .ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#5C5C70;font-size:12px}
.hdr-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.clock{font-size:12px;color:#9494AA}
.wp{display:flex;align-items:center;gap:4px;padding:4px 10px 4px 8px;border-radius:14px;border:1px solid rgba(255,255,255,.04);font-size:12px;cursor:pointer}

/* Bottom Nav */
.bnav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(5,5,10,.82);border-top:1px solid rgba(255,255,255,.04);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
.bnav .it{flex:1;max-width:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:#5C5C70;border:none;background:transparent;font-family:inherit;padding:4px 0;transition:color .2s}
.bnav .it .ico{font-size:20px}
.bnav .it .lbl{font-size:9px;font-weight:500}
.bnav .it.act{color:#7C3AED}

/* Container */
.container{max-width:1100px;margin:0 auto;padding:24px 20px}
.page{display:none}
.page.act{display:block}

/* Hero */
.hero{background:#1A1A24;border:1px solid rgba(255,255,255,.04);border-radius:14px;padding:22px 26px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:28px;transition:transform .2s}
.hero:active{transform:scale(.97)}
.hero .hinfo{flex:1;min-width:110px}
.hero .htag{display:inline-block;padding:3px 10px;border-radius:5px;background:linear-gradient(135deg,#DC2626,#EC4899);font-size:10px;font-weight:600;color:#fff;margin-bottom:6px}
.hero .httl{font-size:17px;font-weight:600;margin-bottom:3px}
.hero .hsub{font-size:12px;color:#9494AA}
.hero .hstat{text-align:right;flex-shrink:0}
.hero .hnum{font-size:32px;font-weight:700;letter-spacing:-.04em;line-height:1;color:#7C3AED}
.hero .hlbl{font-size:12px;color:#9494AA;margin-top:2px}

/* Section */
.shd{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.shd h2{font-size:18px;font-weight:700;letter-spacing:-.03em}
.shd .badge{background:rgba(124,58,237,.1);color:#7C3AED;font-size:10px;padding:2px 8px;border-radius:5px;font-weight:600}

/* Card */
.cd{background:linear-gradient(160deg,rgba(255,255,255,.04),rgba(255,255,255,.01));border:1px solid rgba(255,255,255,.04);border-top:1px solid rgba(255,255,255,.06);border-radius:14px;padding:18px;transition:transform .3s,box-shadow .3s}
.cd:hover{transform:translateY(-3px);border-color:rgba(124,58,237,.1)}
.cd:active{transform:scale(.97)}

/* Scroll containers */
.scrx{display:flex;gap:10px;overflow-x:auto;padding:4px 0 12px}

/* Insight */
.ins{min-width:280px;max-width:340px;padding:16px;flex-shrink:0}
.ins .ic{font-size:13px;font-weight:600;margin-bottom:8px}
.ins .is{font-size:12px;color:#9494AA;line-height:1.6;margin-bottom:12px}
.ins .ips{display:flex;flex-direction:column;gap:3px}
.ins .ip{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:12px;transition:background .15s}
.ins .ip:hover{background:rgba(255,255,255,.03)}
.ins .ip .dot{width:4px;height:4px;border-radius:50%;background:#7C3AED;flex-shrink:0}
.ins .ip .it{flex:1;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ins .ip .isr{font-size:10px;color:#5C5C70;flex-shrink:0}
.ins.c1 .ic{color:#7C3AED}
.ins.c2 .ic{color:#059669}
.ins.c3 .ic{color:#DC2626}
.ins.c4 .ic{color:#D97706}
.ins.c5 .ic{color:#8B5CF6}

/* Paper */
.pap{min-width:250px;max-width:310px;padding:14px;flex-shrink:0;cursor:pointer}
.pap .pct{font-size:10px;color:#7C3AED;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.pap .pt{font-size:13px;font-weight:600;line-height:1.5;margin-bottom:4px}
.pap .pa{font-size:12px;color:#9494AA;line-height:1.5}
.pap .pm{font-size:10px;color:#5C5C70;margin-top:6px;display:flex;gap:6px}

/* Auto */
.aut{min-width:150px;padding:12px;flex-shrink:0}
.aut .top{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.aut .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.aut .dot.g{background:#059669;box-shadow:0 0 6px rgba(5,150,105,.2)}
.aut .dot.y{background:#D97706}
.aut .dn{font-weight:600;font-size:12px}
.aut .info{font-size:11px;color:#9494AA;margin-top:2px}

/* Summary Grid */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:12px}
.sc{padding:16px 12px;text-align:center}
.sc .num{font-size:28px;font-weight:800;color:#059669;letter-spacing:-.04em;margin-bottom:2px;line-height:1.1}
.sc .lbl{font-size:12px;color:#9494AA;font-weight:500}

/* Subnav */
.sn{display:flex;gap:4px;overflow-x:auto;padding:2px 0 10px}
.sn button{padding:5px 12px;border-radius:6px;border:none;background:transparent;color:#5C5C70;font-size:12px;cursor:pointer;white-space:nowrap;font-family:inherit;font-weight:500;transition:background .15s}
.sn button:hover{background:rgba(255,255,255,.04)}
.sn button.act{background:rgba(124,58,237,.08);color:#7C3AED;font-weight:600}

/* Tools */
.tc{display:grid;grid-template-columns:160px 1fr;gap:12px}
.ts{display:flex;flex-direction:column;gap:2px}
.ts button{padding:8px 12px;border-radius:8px;border:none;background:transparent;color:#9494AA;font-size:13px;font-family:inherit;text-align:left;cursor:pointer;transition:background .15s;font-weight:500}
.ts button:hover{background:rgba(255,255,255,.04)}
.ts button.act{background:rgba(124,58,237,.07);color:#7C3AED;font-weight:600}
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
.tcd{padding:14px;cursor:pointer}
.tcd .top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.tcd .emoji{font-size:17px}
.tcd .nm{font-weight:600;font-size:13px;letter-spacing:-.01em}
.tcd .desc{font-size:12px;color:#9494AA;line-height:1.5}
.tcd .tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.tcd .tag{font-size:10px;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,.04);color:#9494AA}

/* Weather popup */
.wpup{display:none;position:fixed;top:56px;right:16px;width:300px;max-width:calc(100vw-32px);background:rgba(10,10,20,.94);border-radius:14px;border:1px solid rgba(255,255,255,.06);padding:16px;z-index:200;box-shadow:0 16px 48px rgba(0,0,0,.4)}
.wpup.op{display:block}
.wpup .cls{position:absolute;top:8px;right:12px;cursor:pointer;color:#5C5C70;font-size:16px}
.wg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.wi{text-align:center;padding:6px 4px;background:rgba(255,255,255,.03);border-radius:8px}
.wi .v{font-size:14px;font-weight:600}
.wi .l{font-size:9px;color:#5C5C70}
.wfc{display:flex;gap:6px;overflow-x:auto}
.wfc .d{min-width:58px;text-align:center;padding:6px 4px;background:rgba(255,255,255,.03);border-radius:8px;font-size:10px;flex-shrink:0}
.wfc .d .dn{color:#5C5C70;font-size:9px}
.wfc .d .dt{font-weight:600;margin:2px 0}

/* Floating UI */
.fab{position:fixed;bottom:66px;right:16px;width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#7C3AED,#8B5CF6);border:none;color:#fff;font-size:16px;cursor:pointer;z-index:50;display:none;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(124,58,237,.15)}
.fab.sh{display:flex}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%)translateY(-8px);background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.15);padding:8px 18px;border-radius:8px;font-size:12px;z-index:200;opacity:0;pointer-events:none;white-space:nowrap;transition:all .25s;backdrop-filter:blur(12px)}
.toast.sh{opacity:1;transform:translateX(-50%)translateY(0)}
.fbtn{background:none;border:none;cursor:pointer;font-size:14px;opacity:.2;padding:2px;line-height:1;flex-shrink:0;margin-left:auto}
.fbtn:hover{opacity:.5}
.fbtn.on{opacity:1}
.fbtn.on::after{content:'⭐'}
.fbtn::after{content:'☆'}
.fpnl{position:fixed;bottom:76px;right:16px;width:240px;max-height:300px;background:rgba(10,10,20,.94);border-radius:12px;border:1px solid rgba(255,255,255,.06);padding:12px;overflow-y:auto;z-index:51;display:none;box-shadow:0 16px 48px rgba(0,0,0,.3)}
.fpnl.op{display:block}
.fpnl .ft{font-size:12px;font-weight:600;margin-bottom:6px;display:flex;justify-content:space-between}
.fpnl .fi{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;cursor:pointer;font-size:11px;transition:background .15s}
.fpnl .fi:hover{background:rgba(255,255,255,.04)}
.fpnl .em{font-size:11px;color:#9494AA;text-align:center;padding:10px}
.fbdg{position:absolute;top:-3px;right:-3px;background:#DC2626;color:#fff;font-size:7px;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
.offb{display:none;position:fixed;top:0;left:0;right:0;background:rgba(220,38,38,.15);border-bottom:1px solid rgba(220,38,38,.1);color:#DC2626;text-align:center;padding:6px;font-size:11px;z-index:300;font-weight:500}

/* Skeleton */
.skel{background:linear-gradient(90deg,rgba(255,255,255,.03)25%,rgba(124,58,237,.04)50%,rgba(255,255,255,.03)75%);background-size:200%100%;animation:shim 1.5s infinite;border-radius:8px;height:70px;margin-bottom:8px}
.skel-ln{height:10px;margin-bottom:6px;border-radius:4px;width:70%}
@keyframes shim{0%{background-position:-200%0}100%{background-position:200%0}}
.load{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.05);border-top-color:#7C3AED;border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}

@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}.splash{display:none!important}}
@media(max-width:700px){
.container{padding:18px 14px}
.tc{grid-template-columns:1fr}
.ts{flex-direction:row;overflow-x:auto;padding-bottom:4px}
.ts button{white-space:nowrap;flex-shrink:0;padding:6px 12px;font-size:12px;text-align:center}
.tg{grid-template-columns:1fr 1fr}
.hero{padding:16px}
.hero .httl{font-size:15px}
.hero .hnum{font-size:26px}
.ins{min-width:calc(100vw-28px);max-width:calc(100vw-28px)}
.pap{min-width:calc(100vw-28px);max-width:calc(100vw-28px)}
}
@media(max-width:480px){
.container{padding:14px 12px}
.tg{grid-template-columns:1fr}
.clock{display:none}
.hero{padding:12px 14px}
.hero .httl{font-size:14px}
.hero .hnum{font-size:22px}
.ins{min-width:calc(100vw-24px);padding:12px}
.pap{min-width:calc(100vw-24px);padding:12px}
.aut{min-width:140px;padding:10px}
.sg{grid-template-columns:repeat(2,1fr)}
.sc .num{font-size:22px}
.splash-title{font-size:18px}
.bnav .it{max-width:65px}
.bnav .it .ico{font-size:18px}
}
</style>
</head>
<body>
<div class="splash" id="splash">
<div class="splash-icon">🧠</div>
<div class="splash-title">AI Center</div>
<div class="splash-sub">Intelligent Hub</div>
</div>
<div class="toast" id="toast"></div>

<div class="fpnl" id="favPanel"><div class="ft"><span>⭐ 收藏</span><span onclick="togFav()" style="cursor:pointer;color:var(--muted)">✕</span></div><div id="favList"></div></div>

</div>
</div>
</header>

<div class="wpup" id="wPop"><div class="cls" onclick="togW()">✕</div><div id="wDet"></div></div>

<div class="container">

<div class="page act" id="p0">
<div class="hero" id="hCard">

</div>
<div class="scrx" id="insSc"></div>
<div class="sn" id="ovSn">
<button class="act" onclick="swOT('t')">📈 趋势</button>
<button onclick="swOT('r')">🕐 最近</button>
<button onclick="swOT('s')">📊 统计</button>
</div>
<div id="ovT" class="ot"><div class="scrx" id="autoSc"></div></div>
<div id="ovR" class="ot" style="display:none"><div class="scrx" id="recentSc"></div></div>
<div id="ovS" class="ot" style="display:none"><div class="sg" id="statG"></div></div>
</div>

<div class="page" id="p1">
<div class="sg" id="papSum"></div>
<div class="scrx" id="papSc"></div>
<div style="font-size:11px;color:#5C5C70;text-align:center;padding:8px">点击卡片查看原文 · 自动刷新</div>
</div>

<div class="page" id="p2">
<div class="tc"><div class="ts" id="tSide"></div><div class="tg" id="tGrid"></div></div>
</div>

<div class="page" id="p3">
<div class="sg" id="autoSum"></div>
<div class="scrx" id="autoSc2"></div>
</div>

<div class="page" id="p4">
<div class="shd"><h2>📜 版本历史</h2></div>
<div id="vList"></div>
<div style="margin-top:10px;font-size:12px;color:#9494AA;padding:12px;background:#1A1A24;border-radius:8px">
<strong>说明</strong><br>每次改版旧版本自动存档至此。点击版本号查看完整页面。
</div>
</div>

</div>

<nav class="bnav">
<button class="it act" data-p="0" onclick="sp(0)"><span class="ico">🏠</span><span class="lbl">总览</span></button>
<button class="it" data-p="1" onclick="sp(1)"><span class="ico">📄</span><span class="lbl">论文</span></button>
<button class="it" data-p="2" onclick="sp(2)"><span class="ico">🧭</span><span class="lbl">工具</span></button>
<button class="it" data-p="3" onclick="sp(3)"><span class="ico">🤖</span><span class="lbl">自动化</span></button>
<button class="it" data-p="4" onclick="sp(4)"><span class="ico">📜</span><span class="lbl">版本</span></button>
</nav>
