<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI Center</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🧠</text></svg>">
<style>
/* ===== Variables ===== */
:root{
--bg:#12121A;--cd:#1A1A24;--cd2:#20202C;
--a1:#7C3AED;--a2:#059669;--a3:#DC2626;
--pink:#EC4899;--amber:#D97706;--cyan:#06B6D4;--vio:#8B5CF6;
--tx:#F1F1F6;--tx2:#9494AA;--tx3:#5C5C70;--muted:#5C5C70;
--r:14px;--rs:10px;--g:8px;--gm:16px;
--ease:cubic-bezier(.4,0,.2,1);--spring:cubic-bezier(.34,1.56,.64,1);
}
*,::before,::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:15px;line-height:1.6;min-height:100vh;padding-bottom:60px;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
::selection{background:rgba(139,91,246,.25)}html{scroll-behavior:smooth}

/* ===== Reduced Motion ===== */
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}.bg,.glow{display:none}.splash{display:none!important}}

/* ===== Background Orbs ===== */
.bg{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.bg__orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.12;will-change:transform}
.bg__orb:nth-child(1){width:min(500px,60vw);height:min(500px,60vw);background:var(--a1);top:-12%;left:-6%;animation:orb 24s ease-in-out infinite}
.bg__orb:nth-child(2){width:min(400px,50vw);height:min(400px,50vw);background:var(--pink);bottom:-10%;right:-5%;animation:orb 28s ease-in-out infinite reverse}
.bg__orb:nth-child(3){width:min(300px,40vw);height:min(300px,40vw);background:var(--cyan);top:45%;left:55%;animation:orb 20s ease-in-out infinite}
.bg__orb:nth-child(4){width:min(250px,35vw);height:min(250px,35vw);background:var(--amber);top:25%;left:30%;animation:orb 22s ease-in-out infinite reverse}
@keyframes orb{0%,100%{transform:translate(0,0)}25%{transform:translate(30px,-25px)}50%{transform:translate(-15px,15px)}75%{transform:translate(20px,20px)}}

/* ===== Mouse Glow (lerp smooth) ===== */
.glow{position:fixed;inset:0;pointer-events:none;z-index:9998;background:radial-gradient(300px circle at var(--mx,0) var(--my,0),rgba(124,58,237,.06) 0%,rgba(236,72,153,.03) 30%,transparent 55%)}

/* ===== Animated Text ===== */
.text--flow{background:linear-gradient(135deg,var(--a1),var(--pink),var(--cyan),var(--a2));background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:tFlow 6s ease-in-out infinite}
@keyframes tFlow{0%{background-position:0% 50%}25%{background-position:100% 0%}50%{background-position:100% 100%}75%{background-position:0% 100%}100%{background-position:0% 50%}}
.sec__title--flow{background:linear-gradient(135deg,var(--tx),var(--a1),var(--pink));background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:h2f 6s ease-in-out infinite}
@keyframes h2f{0%{background-position:0% 50%}25%{background-position:100% 0%}50%{background-position:100% 100%}75%{background-position:0% 100%}100%{background-position:0% 50%}}

/* ===== Splash ===== */
.splash{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity .5s var(--ease)}
.splash.hide{opacity:0;pointer-events:none}
.splash__icon{font-size:44px;margin-bottom:10px;animation:sPop .7s var(--spring) forwards}
.splash__title{font-size:24px;font-weight:700;letter-spacing:-.04em;color:var(--tx);opacity:0;animation:sUp .5s .2s both}
.splash__sub{font-size:13px;color:var(--tx2);margin-top:6px;letter-spacing:3px;text-transform:uppercase;font-weight:400;opacity:0;animation:sUp .5s .4s both}
@keyframes sPop{0%{transform:scale(.3)rotate(-10deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes sUp{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}

/* ===== Header ===== */
.header{position:sticky;top:0;z-index:50;background:rgba(8,8,15,.65);border-bottom:1px solid rgba(255,255,255,.03);padding:9px 18px;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
.header__in{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:10px}
.header__logo{font-size:16px;font-weight:700;white-space:nowrap;display:flex;align-items:center;gap:6px}
.search{flex:1;min-width:60px;position:relative}
.search__input{width:100%;padding:7px 12px 7px 30px;border-radius:var(--rs);border:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.035);color:var(--tx);font-size:13px;outline:none;font-family:inherit;transition:all .3s var(--ease)}
.search__input:focus{border-color:rgba(139,91,246,.25);box-shadow:0 0 0 4px rgba(139,91,246,.06)}
.search__input::placeholder{color:var(--tx3)}
.search__ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:12px;pointer-events:none}
.header__right{display:flex;align-items:center;gap:8px;margin-left:auto}
.clock{font-size:12px;color:var(--tx2);font-variant-numeric:tabular-nums}
.weather{display:flex;align-items:center;gap:4px;padding:4px 10px 4px 8px;border-radius:16px;border:1px solid rgba(255,255,255,.035);font-size:12px;cursor:pointer;transition:all .3s var(--ease)}
.weather:hover{border-color:rgba(124,58,237,.15);background:rgba(124,58,237,.04)}

/* ===== Bottom Nav ===== */
.nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(5,5,10,.82);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(255,255,255,.035);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
.nav__item{flex:1;max-width:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--tx3);border:none;background:transparent;font-family:inherit;padding:4px 0;transition:all .35s var(--ease);-webkit-user-select:none;position:relative}
.nav__ico{font-size:20px;transition:transform .35s var(--spring)}
.nav__lbl{font-size:10px;font-weight:500;letter-spacing:-.01em}
.nav__item--active{color:var(--a1)}
.nav__item--active .nav__ico{transform:translateY(-2px);filter:drop-shadow(0 0 6px rgba(124,58,237,.2))}
.nav__item::after{content:'';position:absolute;bottom:2px;width:14px;height:2px;border-radius:2px;background:var(--a1);transform:scaleX(0);transition:transform .35s var(--ease)}
.nav__item--active::after{transform:scaleX(1)}

/* ===== Layout ===== */
.container{max-width:1200px;margin:0 auto;padding:20px 24px;position:relative;z-index:1}
.page{display:none;animation:pIn .5s var(--ease) both}
.page--active{display:block;position:relative;z-index:1}
@keyframes pIn{0%{opacity:0;transform:translateY(16px) scale(.98)}100%{opacity:1;transform:translateY(0) scale(1)}}

/* ===== Section ===== */
.section{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.section__title{font-size:20px;font-weight:700;letter-spacing:-.03em}
.section__badge{background:rgba(139,91,246,.1);color:var(--a1);font-size:10px;padding:3px 10px;border-radius:6px;font-weight:600;letter-spacing:.02em}

/* ===== Bento Card (with spotlight + glass-shine) ===== */
.card{background:linear-gradient(160deg,rgba(255,255,255,.045),rgba(255,255,255,.01));border:1px solid rgba(255,255,255,.035);border-top:1px solid rgba(255,255,255,.07);border-radius:var(--r);padding:18px;transition:all .5s var(--ease);position:relative;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.12),inset 0 1px 0 rgba(255,255,255,.03)}
/* Spotlight via ::after - mouse tracking */
.card::after{content:'';position:absolute;inset:0;border-radius:inherit;background:radial-gradient(180px circle at var(--cx,50%) var(--cy,50%),rgba(255,255,255,.05) 0%,transparent 60%);pointer-events:none;opacity:0;transition:opacity .4s var(--ease);z-index:1}
.card:hover::after{opacity:1}
/* Glass shine via ::before - moving highlight */
.card::before{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,.03) 48%,rgba(255,255,255,.06) 50%,rgba(255,255,255,.03) 52%,transparent 70%);background-size:200% 100%;animation:shine 6s ease-in-out infinite;pointer-events:none;z-index:0}
@keyframes shine{0%{background-position:200% 0}100%{background-position:-200% 0}}
.card>*{position:relative;z-index:2}
.card:hover{transform:translateY(-3px);border-color:rgba(139,91,246,.1);box-shadow:0 20px 60px rgba(0,0,0,.18),0 0 40px rgba(139,91,246,.03),inset 0 1px 0 rgba(255,255,255,.04)}
.card:active{transform:scale(.97)!important;transition-duration:.1s!important}

/* Hero card */
.card--hero{background:linear-gradient(135deg,rgba(124,92,255,.07),rgba(5,150,105,.03));border:1px solid rgba(124,92,255,.06);padding:22px 26px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-bottom:28px}
.card--hero:hover{border-color:rgba(124,92,255,.12);box-shadow:0 24px 80px rgba(0,0,0,.22),0 0 60px rgba(124,92,255,.05)}
.card--hero::before{background:radial-gradient(350px circle at 80% 20%,rgba(124,92,255,.04) 0%,transparent 60%)}

/* Card size variants */
.card--sm{padding:14px}.card--md{padding:16px}
.card--static{background:var(--cd)}.card--highlight{background:linear-gradient(135deg,rgba(124,92,255,.06),rgba(5,150,105,.03))}

/* ===== Hero Content ===== */
.hero__info{flex:1;min-width:110px}
.hero__tag{display:inline-block;padding:4px 12px;border-radius:6px;background:linear-gradient(135deg,var(--a3),var(--pink));font-size:10px;font-weight:600;color:#fff;margin-bottom:8px}
.hero__title{font-size:18px;font-weight:600;margin-bottom:4px;letter-spacing:-.02em}
.hero__sub{font-size:12px;color:var(--tx2)}
.hero__stat{text-align:right;flex-shrink:0}
.hero__num{font-size:36px;font-weight:700;letter-spacing:-.04em;line-height:1;color:var(--a1)}
.hero__lbl{font-size:12px;color:var(--tx2);margin-top:2px}

/* ===== Scroll Row ===== */
.scroll-x{display:flex;gap:10px;overflow-x:auto;padding:4px 0 14px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.scroll-x::-webkit-scrollbar{height:3px}
.scroll-x::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}

/* ===== Subnav ===== */
.subnav{display:flex;gap:4px;overflow-x:auto;padding:2px 0 12px}
.subnav__btn{padding:6px 14px;border-radius:8px;border:none;background:transparent;color:var(--tx3);font-size:12px;cursor:pointer;white-space:nowrap;font-family:inherit;font-weight:500;transition:all .25s var(--ease);flex-shrink:0}
.subnav__btn:hover{background:rgba(255,255,255,.04);color:var(--tx2)}
.subnav__btn--active{background:rgba(139,91,246,.08);color:var(--a1);font-weight:600}

/* ===== Insight Cards ===== */
.insight{min-width:290px;max-width:360px;padding:18px;flex-shrink:0;scroll-snap-align:start}
.insight__cat{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px;letter-spacing:-.01em}
.insight__sum{font-size:12px;color:var(--tx2);line-height:1.7;margin-bottom:14px}
.insight__list{display:flex;flex-direction:column;gap:3px}
.insight__item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;cursor:pointer;transition:all .2s var(--ease);font-size:12px}
.insight__item:hover{background:rgba(255,255,255,.04)}
.insight__dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.insight__title{flex:1;font-weight:500;color:var(--tx);display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.insight__src{font-size:10px;color:var(--tx3);flex-shrink:0;white-space:nowrap}
.insight--c1 .insight__cat,.insight--c1 .insight__dot{color:var(--a1);background:var(--a1)}
.insight--c2 .insight__cat,.insight--c2 .insight__dot{color:var(--a2);background:var(--a2)}
.insight--c3 .insight__cat,.insight--c3 .insight__dot{color:var(--a3);background:var(--a3)}
.insight--c4 .insight__cat,.insight--c4 .insight__dot{color:var(--amber);background:var(--amber)}
.insight--c5 .insight__cat,.insight--c5 .insight__dot{color:var(--vio);background:var(--vio)}

/* ===== Paper Cards ===== */
.paper{min-width:270px;max-width:330px;padding:16px;flex-shrink:0;cursor:pointer;scroll-snap-align:start}
.paper__cat{font-size:10px;color:var(--a1);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.paper__title{font-size:14px;font-weight:600;line-height:1.5;margin-bottom:6px;letter-spacing:-.01em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.paper__abs{font-size:12px;color:var(--tx2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.paper__meta{font-size:11px;color:var(--tx3);margin-top:8px;display:flex;gap:8px}

/* ===== Auto Cards ===== */
.auto{min-width:170px;padding:14px 16px;flex-shrink:0;scroll-snap-align:start}
.auto__top{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.auto__dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.auto__dot--g{background:var(--a2);box-shadow:0 0 8px rgba(5,150,105,.3)}
.auto__dot--y{background:var(--amber);box-shadow:0 0 8px rgba(217,119,6,.3)}
.auto__name{font-weight:600;font-size:13px}
.auto__info{font-size:11px;color:var(--tx2);margin-top:4px}
.auto__info span{opacity:.7}

/* ===== Summary Grid ===== */
.grid-s{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:var(--g);margin-bottom:14px}
.summary{padding:18px 14px;text-align:center}
.summary__num{font-size:30px;font-weight:800;color:var(--a2);letter-spacing:-.04em;margin-bottom:2px;line-height:1.1}
.summary__lbl{font-size:12px;color:var(--tx2);font-weight:500}

/* ===== Tools ===== */
.tools{display:grid;grid-template-columns:170px 1fr;gap:14px}
.tools__side{display:flex;flex-direction:column;gap:3px}
.tools__btn{padding:9px 14px;border-radius:10px;border:none;background:transparent;color:var(--tx2);font-size:13px;font-family:inherit;text-align:left;cursor:pointer;transition:all .25s var(--ease);font-weight:500}
.tools__btn:hover{background:rgba(255,255,255,.04);color:var(--tx)}
.tools__btn--active{background:rgba(139,91,246,.08);color:var(--a1);font-weight:600}
.tools__grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:var(--g)}
.tool{padding:16px;cursor:pointer}
.tool__top{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.tool__emoji{font-size:18px}
.tool__name{font-weight:600;font-size:14px;letter-spacing:-.01em}
.tool__desc{font-size:12px;color:var(--tx2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tool__tags{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.tool__tag{font-size:10px;padding:3px 8px;border-radius:5px;background:rgba(255,255,255,.04);color:var(--tx2);font-weight:500}
.tool__fav{background:none;border:none;cursor:pointer;font-size:15px;opacity:.25;transition:.2s;padding:2px;line-height:1;flex-shrink:0;margin-left:auto}
.tool__fav:hover{opacity:.5}
.tool__fav--on{opacity:1}
.tool__fav--on::after{content:'⭐'}
.tool__fav::after{content:'☆'}

/* ===== Weather Popup ===== */
.w-pop{display:none;position:fixed;top:60px;right:20px;width:320px;max-width:calc(100vw - 40px);background:rgba(10,10,20,.94);border-radius:var(--r);border:1px solid rgba(255,255,255,.06);padding:18px;z-index:99;box-shadow:0 20px 60px rgba(0,0,0,.5);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px)}
.w-pop--open{display:block;animation:fIn .2s ease}
.w-pop__close{position:absolute;top:10px;right:14px;cursor:pointer;color:var(--tx3);font-size:18px;transition:.2s}
.w-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.w-item{text-align:center;padding:8px 4px;background:rgba(255,255,255,.03);border-radius:10px}
.w-item__v{font-size:16px;font-weight:600}
.w-item__l{font-size:10px;color:var(--tx3);margin-top:1px}
.w-fc{display:flex;gap:6px;overflow-x:auto;padding:2px 0}
.w-fc__day{min-width:64px;text-align:center;padding:8px 4px;background:rgba(255,255,255,.03);border-radius:10px;font-size:11px;flex-shrink:0}
.w-fc__dow{color:var(--tx3);font-size:9px}
.w-fc__temp{font-weight:600;margin:2px 0}

/* ===== Floating UI ===== */
.fab{position:fixed;bottom:68px;right:18px;width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--a1),#A78BFA);border:none;color:#fff;font-size:17px;cursor:pointer;box-shadow:0 4px 20px rgba(139,91,246,.2);z-index:50;display:none;align-items:center;justify-content:center;transition:all .3s var(--ease)}
.fab--show{display:flex}
.fab:hover{transform:translateY(-2px) scale(1.06);box-shadow:0 8px 30px rgba(139,91,246,.3)}
.toast{position:fixed;top:64px;left:50%;transform:translateX(-50%)translateY(-8px);background:rgba(139,91,246,.12);border:1px solid rgba(139,91,246,.15);color:var(--tx);padding:9px 22px;border-radius:var(--rs);font-size:12px;z-index:200;opacity:0;transition:all .35s var(--ease);pointer-events:none;white-space:nowrap;backdrop-filter:blur(16px)}
.toast--show{opacity:1;transform:translateX(-50%)translateY(0)}
.fav-panel{position:fixed;bottom:78px;right:18px;width:260px;max-height:320px;background:rgba(10,10,20,.94);border-radius:var(--r);border:1px solid rgba(255,255,255,.06);padding:14px;overflow-y:auto;z-index:51;display:none;box-shadow:0 20px 60px rgba(0,0,0,.4);backdrop-filter:blur(32px)}
.fav-panel--open{display:block;animation:fIn .15s ease}
.fav-panel__title{font-size:13px;font-weight:600;margin-bottom:8px;display:flex;justify-content:space-between}
.fav-panel__item{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;cursor:pointer;transition:.15s;font-size:12px}
.fav-panel__item:hover{background:rgba(255,255,255,.04)}
.fav-panel__empty{font-size:12px;color:var(--tx2);text-align:center;padding:12px}
.fav-badge{position:absolute;top:-3px;right:-3px;background:var(--a3);color:#fff;font-size:8px;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;box-shadow:0 2px 8px rgba(255,91,143,.3)}

/* ===== Offline ===== */
.offline{display:none;position:fixed;top:0;left:0;right:0;background:rgba(255,91,143,.2);border-bottom:1px solid rgba(255,91,143,.2);color:var(--a3);text-align:center;padding:8px;font-size:12px;z-index:300;font-weight:500}

/* ===== Loading/Skeleton ===== */
.skeleton{background:linear-gradient(90deg,rgba(255,255,255,.03)25%,rgba(124,92,255,.05)50%,rgba(255,255,255,.03)75%);background-size:200%100%;animation:shim 1.5s infinite;border-radius:var(--rs);height:80px;margin-bottom:8px}
@keyframes shim{0%{background-position:-200%0}100%{background-position:200%0}}
.loading{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.06);border-top-color:var(--a1);border-radius:50%;animation:spn .6s linear infinite;vertical-align:middle}
@keyframes spn{to{transform:rotate(360deg)}}
@keyframes fIn{from{opacity:0}to{opacity:1}}

/* ===== Todo / Task List Module ===== */
.todo-hero{margin-bottom:20px}
.todo-hero__head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.todo-hero__ttl{font-size:16px;font-weight:700;display:flex;align-items:center;gap:6px}
.todo-hero__count{font-size:12px;color:var(--tx3)}
.todo-progress{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-bottom:14px}
.todo-progress__bar{height:100%;background:linear-gradient(90deg,var(--a1),var(--pink));border-radius:2px;transition:width .5s var(--ease)}
.todo-stats{display:flex;gap:8px}
.todo-stat{flex:1;padding:10px;border-radius:var(--rs);background:rgba(255,255,255,.02);text-align:center}
.todo-stat__num{font-size:20px;font-weight:700;color:var(--tx)}
.todo-stat__lbl{font-size:11px;color:var(--tx3);margin-top:2px}
.todo-list{display:flex;flex-direction:column;gap:6px}
.todo-item{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--rs);background:rgba(255,255,255,.02);border:1px solid transparent;transition:all .25s var(--ease);cursor:default}
.todo-item:hover{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.05)}
.todo-item--done{opacity:.55}
.todo-item--done .todo-item__text{text-decoration:line-through;color:var(--tx3)}
.todo-check{width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,.15);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s var(--ease)}
.todo-check:hover{border-color:var(--a1);background:rgba(124,58,237,.08)}
.todo-check--checked{background:var(--a1);border-color:var(--a1)}
.todo-check--checked::after{content:'✓';color:#fff;font-size:12px;font-weight:700}
.todo-item__body{flex:1;min-width:0}
.todo-item__text{font-size:14px;font-weight:500;line-height:1.4;word-break:break-word}
.todo-item__meta{font-size:11px;color:var(--tx3);margin-top:2px;display:flex;gap:8px;align-items:center}
.todo-item__deadline{display:flex;align-items:center;gap:3px}
.todo-item__deadline--urgent{color:var(--a3)}
.todo-item__deadline--soon{color:var(--amber)}
.todo-del{background:none;border:none;cursor:pointer;font-size:16px;color:var(--tx3);padding:4px;opacity:0;transition:opacity .2s;flex-shrink:0}
.todo-item:hover .todo-del{opacity:1}
.todo-del:hover{color:var(--a3)}

/* Todo add form */
.todo-add{display:flex;gap:8px;margin-bottom:12px}
.todo-add__input{flex:1;padding:10px 14px;border-radius:var(--rs);border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);color:var(--tx);font-size:14px;outline:none;font-family:inherit;transition:border .2s}
.todo-add__input:focus{border-color:rgba(124,58,237,.25)}
.todo-add__input::placeholder{color:var(--tx3)}
.todo-add__btn{padding:10px 18px;border-radius:var(--rs);border:none;background:linear-gradient(135deg,var(--a1),#8B5CF6);color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:transform .2s;white-space:nowrap;font-family:inherit}
.todo-add__btn:hover{transform:scale(1.02)}
.todo-add__btn:active{transform:scale(.97)}

/* ===== Request List (需求记录) ===== */
.req-list{display:flex;flex-direction:column;gap:6px}
.req-item{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-radius:var(--rs);background:rgba(255,255,255,.02);border-left:3px solid var(--a1)}
.req-item--done{border-left-color:var(--a2);opacity:.6}
.req-item__body{flex:1}
.req-item__text{font-size:13px;font-weight:500;line-height:1.5}
.req-item__date{font-size:11px;color:var(--tx3);margin-top:4px}
.req-item__status{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600;flex-shrink:0}
.req-item__status--open{background:rgba(220,38,38,.1);color:var(--a3)}
.req-item__status--doing{background:rgba(124,58,237,.1);color:var(--a1)}
.req-item__status--done{background:rgba(5,150,105,.1);color:var(--a2)}

/* ===== Responsive ===== */
@media(max-width:800px){
.container{padding:16px 20px}
.tools{grid-template-columns:1fr}
.tools__side{flex-direction:row;overflow-x:auto;padding-bottom:4px;gap:4px}
.tools__btn{white-space:nowrap;flex-shrink:0;padding:7px 14px;font-size:12px;text-align:center}
.tools__grid{grid-template-columns:1fr 1fr}
.card--hero{padding:16px 18px}.hero__title{font-size:16px}.hero__num{font-size:28px}
.insight,.paper{min-width:260px}
.w-pop{right:10px;width:calc(100vw - 20px);top:56px}
}
@media(max-width:520px){
.container{padding:14px 16px}
.tools__grid{grid-template-columns:1fr}
.clock{display:none}
.card--hero{padding:14px 16px}.hero__title{font-size:15px}.hero__num{font-size:24px}
.insight,.paper{min-width:calc(100vw - 32px);max-width:calc(100vw - 32px);padding:14px}
.grid-s{grid-template-columns:repeat(2,1fr)}.summary__num{font-size:22px}
.nav__item{max-width:72px}.nav__ico{font-size:19px}
.todo-stats{flex-wrap:wrap}
}
@media(max-width:380px){
.tools__btn{font-size:11px;padding:5px 10px}
.insight__cat{font-size:12px}.insight__sum{font-size:11px}
}

/* Light mode */
@media(prefers-color-scheme:light){
:root{--bg:#F5F5F7;--card:#FFFFFF;--cd:rgba(0,0,0,.03);--cd2:rgba(0,0,0,.055);--tx:rgba(0,0,0,.85);--tx2:rgba(0,0,0,.45);--tx3:rgba(0,0,0,.2)}
.card,.card--hero{border-color:rgba(139,91,246,.08)!important}
header,.nav{background:rgba(245,245,247,.72)!important}
}
</style>

/* ============================
   TODO MODULE (待办清单)
   localStorage key: ac_todos
   Fields: {id,text,done,createdAt,deadline?,priority?}
   ============================ */
const Todo = {
STORAGE_KEY: 'ac_todos',
_filter: 'all',

_get(){try{return JSON.parse(localStorage.getItem(this.STORAGE_KEY))||[]}catch(e){return[]}},
_save(data){localStorage.setItem(this.STORAGE_KEY,JSON.stringify(data));Cache.set('_todos_cache',data,5000)},

init(){
const todos=this._get();
this.renderHero(todos);this.renderFull(todos);

// Bind mouse tracking to cards for spotlight
document.querySelectorAll('.todo-item,.card--hero').forEach(el=>{
el.addEventListener('mousemove',e=>{
const r=el.getBoundingClientRect();
el.style.setProperty('--cx',((e.clientX-r.left)/r.width*100)+'%');
el.style.setProperty('--cy',((e.clientY-r.top)/r.height*100)+'%');
})
});
},

renderHero(todos){
const done=todos.filter(t=>t.done).length;
const total=todos.length;
const urgent=todos.filter(t=>!t.done&&t.priority==='high').length;
$('todoCount').textContent=done+'/'+total;
$('todoTotal').textContent=total;
$('todoDoneNum').textContent=done;
$('todoUrgent').textContent=urgent;
$('todoBar').style.width=total?Math.round(done/total*100)+'%':'0%';

// Show only first 5 in hero card, rest hidden
const show=todos.slice(0,5);
$('todoList').innerHTML=show.map(t=>this._renderItem(t,true)).join('');
if(total>5)$('todoList').innerHTML+='<div style="font-size:12px;color:var(--tx3);text-align:center;padding:8px">还有 '+(total-5)+' 个任务 → 查看「待办」页面</div>';
else if(total===0)$('todoList').innerHTML='<div style="font-size:12px;color:var(--tx3);text-align:center;padding:16px">暂无待办 ✅ 点击上方按钮添加</div>';
},

renderFull(todos){
let filtered=[...todos];
if(this._filter==='pending')filtered=todos.filter(t=>!t.done);
else if(this._filter==='done')filtered=todos.filter(t=>t.done);
else if(this._filter==='urgent')filtered=todos.filter(t=>!t.done&&t.priority==='high');

$('todoFilterLabel').textContent=`(${filtered.length} 项)`;
if(filtered.length===0){$('todoFullList').innerHTML='<div style="text-align:center;padding:30px;color:var(--tx3);font-size:13px">没有符合条件的任务</div>';return}
$('todoFullList').innerHTML=filtered.map(t=>this._renderItem(t,false)).join('');
},

_renderItem(t,isHero){
const dlClass=t.deadline&&!t.done?(Date.now()>new Date(t.deadline).getTime()?'todo-item__deadline--urgent':'todo-item__deadline--soon'):'';
const dlText=t.deadline?this._formatDeadline(new Date(t.deadline)):'';
return '<div class="todo-item'+(t.done?' todo-item--done')+'" data-id="'+t.id+'">'+
'<div class="todo-check'+(t.done?' todo-check--checked')+'" onclick="Todo.toggle(\''+t.id+'\')"></div>'+
'<div class="todo-item__body">'+
'<div class="todo-item__text">'+esc(t.text)+'</div>'+
(isHero?'':'<div class="todo-item__meta">'+
(dlText?'<span class="todo-item__deadline '+dlClass+'">⏰ '+dlText+'</span>':'')+
(t.priority==='high'?'<span style="color:var(--a3)">🔴 紧急</span>':'')+
'</div>')+
'</div>'+
(!isHero?'<button class="todo-del" onclick="Todo.del(\''+t.id+'\')" title="删除">×</button>':'')+
'</div>';
},

add(){
const input=$('todoInput');const text=input.value.trim();
if(!text){toast('请输入内容');return}
const todos=this._get();
todos.unshift({id:'td_'+Date.now(),text:text,done:false,createdAt:new Date().toISOString(),priority:null,deadline:null});
this._save(todos);input.value='';
this.init(); // re-render both views
toast('已添加: '+text);
},
addFromFull(){
const input=$('todoFullInput');const text=input.value.trim();
if(!text){toast('请输入内容');return}
const todos=this._get();
todos.unshift({id:'td_'+Date.now(),text:text,done:false,createdAt:new Date().toISOString(),priority:null,deadline:null});
this._save(todos);input.value='';
this.init();toast('已添加: '+text);
},
toggle(id){
const todos=this._get();
const item=todos.find(t=>t.id===id);
if(item)item.done=!item.done;
this._save(todos);this.init();toast(item.done?'✅ 已完成':'↩️ 重做了');
},
del(id){
const todos=this._get();const idx=todos.findIndex(t=>t.id===id);
if(idx>-1){const removed=todos.splice(idx,1)[0];this._save(todos);this.init();toast('已删除: '+removed.text)}},
filter(type){this._filter=type;document.querySelectorAll('#p-todos .subnav__btn').forEach(b=>b.classList.remove('subnav__btn--active'));
event.target.classList.add('subnav__btn--active');
this.renderFull(this._get());
},
toggleAdd(){
const area=$('todoAddArea');const btn=$('todoToggleBtn');
if(area.style.display==='none'){area.style.display='block';btn.textContent='收起'}else{area.style.display='none';btn.textContent='+ 添加'}
},
_formatDeadline(d){
const now=new Date();const diff=d-now;
const days=Math.ceil(diff/86400000);
if(days<0)return'已过期';
if(days===0)return'今天';
if(days===1)return'明天';
return d.getMonth()+1+'/'+d.getDate()
}
};

/* ============================
   REQUEST LIST (需求记录)

   ============================ */
const Req = {
STORAGE_KEY: 'ac_requests',

_get(){try{return JSON.parse(localStorage.getItem(this.STORAGE_KEY))||[]}catch(e){return[]}},
_save(data){localStorage.setItem(this.STORAGE_KEY,JSON.stringify(data))},

init(){

},

render(reqs){
if(reqs.length===0){$('reqList').innerHTML='<div style="text-align:center;padding:30px;color:var(--tx3);font-size:13px">还没有需求记录<br>在上方输入框记录你的第一个需求</div>';return}
// Sort by date desc (newest first)
reqs.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
$('reqList').innerHTML=reqs.map(r=>{
const statusMap={'open':['open','待处理'],'doing':['doing','进行中'],'done':['done','已完成']};
let cur=r.status||'open';
const [cls,label]=statusMap[cur]||['open','待处理'];
return '<div class="req-item'+(cur==='done'?' req-item--done')+'" data-id="'+r.id+'" onclick="Req.cycleStatus(\''+r.id+'\')">'+
'<div class="req-item__body">'+
'<div class="req-item__text">'+esc(r.text)+'</div>'+
'<div class="req-item__date">'+this._fmt(r.createdAt)+'</div>'+
'</div>'+
'<span class="req-item__status req-item__status--'+cls+'" title="点击切换">'+label+'</span>'+
'</div>';
}).join('');
},

add(){
const input=$('reqInput');const text=input.value.trim();
if(!text){toast('请输入需求内容');return}
const reqs=this._get();
reqs.unshift({id:'rq_'+Date.now(),text:text,status:'open',createdAt:new Date().toISOString()});
this._save(reqs);input.value='';
this.render(reqs);
toast('已记录: '+text);
},
cycleStatus(id){
const reqs=this._get();const item=reqs.find(r=>r.id===id);
if(!item)return;
const flow=['open','doing','done'];
const idx=flow.indexOf(item.status);
item.status=flow[(idx+1)%3];
this._save(reqs);this.render(reqs);
toast('→ '+({'open':'待处理','doing':'进行中','done':'已完成'})[item.status])
},

_fmt(iso){try{const d=new Date(iso);return d.getMonth()+1+'/'+d.getDate()+" "+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}catch(e){return iso}}
};

(function mf(){_lx+=(_mx-_lx)*0.08;_ly+=(_my-_ly)*0.08;document.documentElement.style.setProperty('--mx',_lx+'px');document.documentElement.style.setProperty('--my',_ly+'px');requestAnimationFrame(mf)})();

/* ===== Card Mouse Tracking (spotlight) ===== */
document.addEventListener('mousemove',e=>{
document.querySelectorAll('.card').forEach(el=>{
const r=el.getBoundingClientRect();
el.style.setProperty('--cx',((e.clientX-r.left)/r.width*100)+'%');
el.style.setProperty('--cy',((e.clientY-r.top)/r.height*100)+'%');
});
});

/* ============================
   EVENTS BINDING
   ============================ */
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('toast--show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('toast--show'),2200)}

// Nav clicks
document.querySelectorAll('.nav__item').forEach(b=>b.addEventListener('click',()=>switchPage(b.dataset.page)));

// Search
$('search').addEventListener('input',e=>Tools.search(e.target.value));

// Weather toggle
document.querySelectorAll('[data-act="weather"]').forEach(el=>el.addEventListener('click',()=>Weather.toggle()));

// Favorites panel
document.getElementById('fabFav').addEventListener('click',()=>Favs.togglePanel());
document.querySelector('[data-act="favClose"]')?.addEventListener('click',()=>Favs.togglePanel());

// Tool favorites (delegated)
document.getElementById('tGrid').addEventListener('click',e=>{
const btn=e.target.closest('.tool__fav');
if(btn)Favs.toggle(btn.dataset.fav,e);
});

// Scroll to top
window.addEventListener('scroll',()=>$('fabTop').classList.toggle('fab--show',window.scrollY>300));
document.getElementById('fabTop').addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));

// Overview tabs
document.querySelectorAll('#ovSn .subnav__btn').forEach(b=>b.addEventListener('click',function(){
document.querySelectorAll('#ovSn .subnav__btn').forEach(x=>x.classList.remove('subnav__btn--active'));
document.querySelectorAll('#p-overview .tab').forEach(t=>t.style.display='none');
$('tab-'+this.dataset.tab).style.display='block';
this.classList.add('subnav__btn--active');
}));

// Offline detection
window.addEventListener('online',()=>{$('offline').style.display='none'});
window.addEventListener('offline',()=>{$('offline').style.display='block'});

// Close popups on outside click
document.addEventListener('click',e=>{
if(!e.target.closest('.w-pop')&&!e.target.closest('[data-act="weather"]'))$('wPop').classList.remove('w-pop--open');
if(!e.target.closest('.fav-panel')&&!e.target.closest('#fabFav'))$('favPnl').classList.remove('fav-panel--open');
});

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
if(e.key==='/'&&e.target.tagName!=='INPUT'){e.preventDefault();$('search').focus()}
if(e.key==='Escape'){$('wPop').classList.remove('w-pop--open');$('favPnl').classList.remove('fav-panel--open')}
});

/* ============================
   SPLASH & INIT (with error safety)
   ============================ */
(function(){
const s=$('splash');
if(!s)return;
// Force hide splash after 1.5s (primary)
// Backup: force remove after 3s no matter what
setTimeout(()=>{
  try{s.classList.add('hide')}catch(e){}
  setTimeout(()=>{try{if(s&&s.parentNode)s.style.display='none'}catch(e){}},500);
},1500);
// Emergency backup: if JS errors block everything, brute-force remove
setTimeout(()=>{
  try{
    const el=document.getElementById('splash');
    if(el)el.remove();
  }catch(e){}
},3000);
})();

// Init all modules (each wrapped in error safety)
function safeInit(name,fn){try{fn()}catch(e){console.warn('[AI Center] '+name+' init error:',e)}}
safeInit('Tools',()=>Tools.render());
safeInit('Weather',()=>Weather.load());
safeInit('Papers',()=>Papers.load());
safeInit('Autos',()=>Autos.load());
safeInit('Versions',()=>Versions.load());
safeInit('Insights',()=>Insights.render());
safeInit('Todo',()=>Todo.init());
safeInit('Req',()=>Req.init());

// Auto refresh intervals
setInterval(()=>safeInit('Papers-refresh',()=>Papers.load()),300000);
setInterval(()=>safeInit('Weather-refresh',()=>Weather.load()),600000);
setInterval(()=>safeInit('Autos-refresh',()=>Autos.load()),120000);
</script>
</body>
</html>
