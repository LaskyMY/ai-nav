<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>AI Center</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🧠</text></svg>">
<style>
:root {
  --bg:#12121A; --card:#1A1A24; --card2:#20202C;
  --accent:#7C3AED; --accent2:#059669; --accent3:#DC2626;
  --amber:#D97706; --pink:#EC4899; --cyan:#06B6D4; --violet:#8B5CF6;
  --text:#F1F1F6; --text2:#9494AA; --text3:#5C5C70; --muted:#5C5C70;
  --nav-h:56px;
  --radius:14px; --radius-sm:10px;
  --space-md:24px; --space-sm:16px;
  --smooth:cubic-bezier(0.4,0,0.2,1); --spring:cubic-bezier(0.34,1.56,0.64,1);
  --fs-base:15px; --fs-sm:13px; --fs-md:18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:var(--fs-base);line-height:1.6;min-height:100dvh;padding-bottom:calc(var(--nav-h)+var(--space-md));-webkit-font-smoothing:antialiased;overflow-x:hidden}
::selection{background:rgba(139,91,246,.25)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:4px}
html{scroll-behavior:smooth}

@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}.bg-orbs,.mouse-glow{display:none}.splash{display:none!important}}

/* ===== Mouse Glow ===== */
.mouse-glow{position:fixed;inset:0;pointer-events:none;z-index:9998;background:radial-gradient(280px circle at var(--mx,0) var(--my,0),rgba(124,58,237,.06) 0%,rgba(236,72,153,.03) 30%,transparent 55%)}

/* ===== Background Orbs ===== */
.bg-orbs{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.bg-orbs .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.12;will-change:transform}
.bg-orbs .orb:nth-child(1){width:min(500px,60vw);height:min(500px,60vw);background:var(--accent);top:-10%;left:-5%;animation:orbFloat 22s ease-in-out infinite}
.bg-orbs .orb:nth-child(2){width:min(400px,50vw);height:min(400px,50vw);background:var(--pink);bottom:-12%;right:-6%;animation:orbFloat 26s ease-in-out infinite reverse}
.bg-orbs .orb:nth-child(3){width:min(300px,40vw);height:min(300px,40vw);background:var(--cyan);top:40%;left:50%;animation:orbFloat 30s ease-in-out infinite}
.bg-orbs .orb:nth-child(4){width:min(250px,35vw);height:min(250px,35vw);background:var(--amber);top:60%;right:10%;animation:orbFloat 20s ease-in-out infinite reverse}
@keyframes orbFloat{0%,100%{transform:translate(0,0)scale(1)}25%{transform:translate(30px,-40px)scale(1.1)}50%{transform:translate(-20px,20px)scale(.95)}75%{transform:translate(40px,30px)scale(1.05)}}

/* ===== Splash ===== */
.splash{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s ease}
.splash.hide{opacity:0;pointer-events:none}
.splash-burst{position:relative;width:80px;height:80px;display:flex;align-items:center;justify-content:center;animation:splashScale .7s var(--spring) forwards}
.splash-burst .ring{position:absolute;border-radius:50%;border:1.5px solid;opacity:0}
.splash-burst .ring:nth-child(1){width:100%;height:100%;border-color:var(--accent);animation:ringExpand .9s ease-out .1s forwards}
.splash-burst .ring:nth-child(2){width:100%;height:100%;border-color:var(--pink);animation:ringExpand .9s ease-out .25s forwards}
.splash-burst .ring:nth-child(3){width:100%;height:100%;border-color:var(--cyan);animation:ringExpand .9s ease-out .4s forwards}
.splash-burst .ring:nth-child(4){width:100%;height:100%;border-color:var(--accent2);animation:ringExpand .9s ease-out .55s forwards}
@keyframes ringExpand{0%{transform:scale(.3);opacity:.7}100%{transform:scale(2.2);opacity:0}}
.splash-burst .core{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--pink));position:relative;z-index:2;animation:corePulse 1.5s ease-in-out infinite}
.splash-burst .core::before{content:'';position:absolute;inset:-4px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--pink),var(--cyan));opacity:.3;animation:coreGlow 1.5s ease-in-out infinite}
@keyframes corePulse{0%,100%{box-shadow:0 0 20px rgba(124,58,237,.3)}50%{box-shadow:0 0 50px rgba(124,58,237,.6)}}
@keyframes coreGlow{0%,100%{transform:scale(1);opacity:.2}50%{transform:scale(1.3);opacity:.4}}
.splash-title{font-size:24px;font-weight:700;letter-spacing:-.04em;margin-top:16px;color:var(--text);opacity:0;animation:splashIn .6s ease .3s forwards;position:relative}
.splash-title::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--pink));animation:titleUnderline .5s ease .7s forwards}
@keyframes titleUnderline{to{width:100%}}
.splash-sub{font-size:12px;color:var(--text2);letter-spacing:3px;text-transform:uppercase;margin-top:8px;opacity:0;animation:splashIn .6s ease .5s forwards}
@keyframes splashScale{0%{transform:scale(.2);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes splashIn{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}

/* ===== Header ===== */
header{position:sticky;top:0;z-index:50;background:rgba(8,8,15,.6);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-bottom:1px solid rgba(255,255,255,.03);padding:clamp(8px,1vh,14px) clamp(14px,2vw,24px)}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:clamp(8px,1.2vw,16px)}
.logo{font-size:clamp(15px,1.2vw+4px,20px);font-weight:700;letter-spacing:-.03em;display:flex;align-items:center;gap:clamp(4px,.5vw,8px);color:var(--text)}
.logo .ico{font-size:clamp(18px,1.4vw+4px,24px)}
.search-wrap{flex:1;min-width:80px;position:relative}
.search-wrap input{width:100%;padding:clamp(6px,.5vh+2px,9px) clamp(10px,.8vw+4px,16px) clamp(6px,.5vh+2px,9px) clamp(30px,2.5vw+6px,40px);border-radius:var(--radius-sm);border:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.035);color:var(--text);font-size:var(--fs-sm);outline:none;transition:all .3s ease;font-family:inherit}
.search-wrap input:focus{border-color:rgba(139,91,246,.25);box-shadow:0 0 0 4px rgba(139,91,246,.06)}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap .ico{position:absolute;left:clamp(10px,.8vw+4px,14px);top:50%;transform:translateY(-50%);color:var(--text3);font-size:var(--fs-sm);pointer-events:none}
.header-right{display:flex;align-items:center;gap:clamp(6px,.8vw,12px);margin-left:auto}
.weather-pill{display:flex;align-items:center;gap:clamp(4px,.4vw,8px);background:rgba(255,255,255,.035);padding:clamp(4px,.3vh+2px,6px) clamp(10px,.8vw+4px,16px) clamp(4px,.3vh+2px,6px) clamp(8px,.6vw+2px,12px);border-radius:20px;font-size:var(--fs-sm);cursor:pointer;transition:all .3s ease;border:1px solid rgba(255,255,255,.035)}
.weather-pill:hover{border-color:rgba(139,91,246,.15);background:rgba(139,91,246,.05)}
.clock{font-size:var(--fs-sm);color:var(--text2);font-variant-numeric:tabular-nums}

/* ===== Bottom Nav ===== */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:rgba(5,5,10,.8);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(255,255,255,.04);display:flex;z-index:100;justify-content:center;padding-bottom:env(safe-area-inset-bottom,0)}
.bottom-nav .item{flex:1;max-width:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--text3);border:none;background:transparent;font-family:inherit;padding:4px 0;transition:all .35s var(--smooth);-webkit-user-select:none;position:relative}
.bottom-nav .item .ico{font-size:20px;transition:transform .35s var(--spring)}
.bottom-nav .item .lbl{font-size:10px;font-weight:500;letter-spacing:-.01em}
.bottom-nav .item.active{color:var(--accent)}
.bottom-nav .item.active .ico{transform:translateY(-2px);filter:drop-shadow(0 0 6px rgba(124,58,237,.2))}
.bottom-nav .item::after{content:'';position:absolute;bottom:clamp(2px,.3vh,4px);width:clamp(12px,1.5vw,18px);height:clamp(2px,.2vh,3px);border-radius:2px;background:var(--accent);transform:scaleX(0);transition:transform .35s var(--smooth)}
.bottom-nav .item.active::after{transform:scaleX(1)}
.bottom-nav .item:active{opacity:.5}

/* ===== Pages & Container ===== */
.container{max-width:1200px;margin:0 auto;padding:28px 28px;position:relative;z-index:1}
.page{display:none;animation:pageIn .5s var(--smooth) both}
.page.active{display:block;position:relative;z-index:1}
@keyframes pageIn{0%{opacity:0;transform:translateY(16px) scale(.98)}100%{opacity:1;transform:translateY(0) scale(1)}}

/* ===== Hero Card ===== */
.hero-card{background:var(--card);border:1px solid rgba(255,255,255,.04);border-radius:var(--radius);padding:24px 28px;box-shadow:0 2px 12px rgba(0,0,0,.06);transition:transform .25s,border-color .25s,box-shadow .25s;display:flex;align-items:center;gap:20px;flex-wrap:wrap;margin-bottom:32px;position:relative;overflow:hidden}
.hero-card:hover{transform:translateY(-2px);border-color:rgba(124,58,237,.08)}
.hero-card:active{transform:scale(.97)}
.hero-card .info{flex:1;min-width:120px}
.hero-card .tag{display:inline-block;padding:4px 12px;border-radius:6px;background:linear-gradient(135deg,var(--accent3),var(--pink));font-size:10px;font-weight:600;color:#fff;margin-bottom:8px}
.hero-card .ttl{font-size:18px;font-weight:600;letter-spacing:-.02em;margin-bottom:4px}
.hero-card .ttl .glow{background:linear-gradient(135deg,var(--text),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200%200%;animation:gShift 3s ease-in-out infinite}
@keyframes gShift{0%,100%{background-position:0%50%}50%{background-position:100%50%}}
.hero-card .sub{font-size:12px;color:var(--text2)}
.hero-card .stat{text-align:right;flex-shrink:0}
.hero-card .stat .num{font-size:34px;font-weight:700;letter-spacing:-.04em;line-height:1;color:var(--accent)}
.hero-card .stat .lbl{font-size:12px;color:var(--text2);margin-top:2px}

/* ===== Section Header ===== */
.section-hd{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding:0 2px}
.section-hd h2{font-size:20px;font-weight:700;letter-spacing:-.03em;background:linear-gradient(135deg,var(--text),var(--accent),var(--pink));background-size:200%200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:h2Flow 6s ease-in-out infinite}
@keyframes h2Flow{0%{background-position:0%50%}25%{background-position:100%0%}50%{background-position:100%100%}75%{background-position:0%100%}100%{background-position:0%50%}}
.section-hd .badge{background:rgba(139,91,246,.1);color:var(--accent);font-size:10px;padding:3px 10px;border-radius:6px;font-weight:600;letter-spacing:.02em}

/* ===== Card Base (bento style) ===== */
.card{background:linear-gradient(160deg,rgba(255,255,255,.045),rgba(255,255,255,.01));border:1px solid rgba(255,255,255,.04);border-top:1px solid rgba(255,255,255,.07);border-radius:var(--radius);padding:20px;transition:all .5s var(--smooth);position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,.03)}
.card:hover{transform:translateY(clamp(-2px,-.4vh-2px,-5px));border-color:rgba(139,91,246,.1);box-shadow:0 20px 60px rgba(0,0,0,.18),0 0 40px rgba(139,91,246,.03),inset 0 1px 0 rgba(255,255,255,.04)}
.card:active{transform:scale(.97)!important;transition-duration:.1s!important}

/* Card spotlight via ::after */
.card::after{content:'';position:absolute;inset:0;border-radius:inherit;background:radial-gradient(200px circle at var(--cx,50%) var(--cy,50%),rgba(255,255,255,.04) 0%,transparent 55%);pointer-events:none;opacity:0;transition:opacity .4s ease;z-index:1}
.card:hover::after{opacity:1}
.card>*{position:relative;z-index:2}

/* ===== Scroll containers ===== */
.insight-scroll,.paper-scroll,.auto-scroll{display:flex;gap:10px;overflow-x:auto;padding:4px 0 14px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.insight-scroll::-webkit-scrollbar,.paper-scroll::-webkit-scrollbar,.auto-scroll::-webkit-scrollbar{height:4px}
.insight-scroll::-webkit-scrollbar-thumb,.paper-scroll::-webkit-scrollbar-thumb,.auto-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px}

/* ===== Insight Cards ===== */
.insight-card{min-width:280px;max-width:340px;padding:18px;flex-shrink:0;scroll-snap-align:start}
.insight-card .icat{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px;letter-spacing:-.01em}
.insight-card .isum{font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:14px}
.insight-card .ipapers{display:flex;flex-direction:column;gap:3px}
.insight-card .ipaper{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;cursor:pointer;transition:all .2s ease;font-size:12px}
.insight-card .ipaper:hover{background:rgba(255,255,255,.03)}
.insight-card .ipaper .dotw{width:4px;height:4px;border-radius:50%;background:var(--accent);flex-shrink:0}
.insight-card .ipaper .ititle{flex:1;font-weight:500;color:var(--text);display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.insight-card .ipaper .isrc{font-size:10px;color:var(--text3);white-space:nowrap}
.insight-card.c1 .icat{color:var(--accent)}
.insight-card.c2 .icat{color:var(--accent2)}
.insight-card.c3 .icat{color:var(--accent3)}
.insight-card.c4 .icat{color:var(--amber)}
.insight-card.c5 .icat{color:var(--violet)}

/* ===== Paper Cards ===== */
.paper-card{min-width:260px;max-width:320px;padding:16px;flex-shrink:0;cursor:pointer;scroll-snap-align:start}
.paper-card .ct{font-size:10px;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.paper-card .ptitle{font-size:14px;font-weight:600;line-height:1.5;margin-bottom:6px;letter-spacing:-.01em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.paper-card .psum{font-size:12px;color:var(--text2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.paper-card .pmeta{font-size:11px;color:var(--text3);margin-top:8px;display:flex;gap:8px}

/* ===== Auto Cards ===== */
.auto-card{min-width:160px;padding:14px;flex-shrink:0;scroll-snap-align:start}
.auto-card .top{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.auto-card .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.auto-card .dot.green{background:var(--accent2);box-shadow:0 0 8px rgba(5,150,105,.3)}
.auto-card .dot.yellow{background:var(--amber);box-shadow:0 0 8px rgba(217,119,6,.3)}
.auto-card .dname{font-weight:600;font-size:13px}
.auto-card .info{font-size:11px;color:var(--text2);margin-top:3px}

/* ===== Summary Grid ===== */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:14px}
.summary-card{padding:18px 14px;text-align:center;position:relative}
.summary-card .num{font-size:30px;font-weight:800;color:var(--accent2);letter-spacing:-.04em;margin-bottom:2px;line-height:1.1}
.summary-card .lbl{font-size:12px;color:var(--text2);font-weight:500}

/* ===== Subnav ===== */
.subnav{display:flex;gap:4px;overflow-x:auto;padding:2px 0 12px}
.subnav button{padding:6px 14px;border-radius:8px;border:none;background:transparent;color:var(--text3);font-size:12px;cursor:pointer;white-space:nowrap;transition:all .25s ease;flex-shrink:0;font-family:inherit;font-weight:500}
.subnav button:hover{background:rgba(255,255,255,.04);color:var(--text2)}
.subnav button.active{background:rgba(139,91,246,.08);color:var(--accent);font-weight:600}

/* ===== Tools ===== */
.tool-col{display:grid;grid-template-columns:180px 1fr;gap:14px}
.tool-sidebar{display:flex;flex-direction:column;gap:3px}
.tool-sidebar button{padding:9px 14px;border-radius:10px;border:none;background:transparent;color:var(--text2);font-size:13px;font-family:inherit;text-align:left;cursor:pointer;transition:all .25s ease;font-weight:500}
.tool-sidebar button:hover{background:rgba(255,255,255,.04);color:var(--text)}
.tool-sidebar button.active{background:rgba(139,91,246,.08);color:var(--accent);font-weight:600}
.tool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.tool-card{padding:16px;cursor:pointer}
.tool-card .top{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.tool-card .emoji{font-size:18px}
.tool-card .name,.tool-card .nm{font-weight:600;font-size:14px;letter-spacing:-.01em}
.tool-card .desc{font-size:12px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tool-card .tags{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.tool-card .tag{font-size:10px;padding:3px 8px;border-radius:5px;background:rgba(255,255,255,.04);color:var(--text2);font-weight:500}

/* ===== Weather Popover ===== */
.weather-pop{display:none;position:fixed;top:60px;right:20px;width:320px;max-width:calc(100vw-40px);background:rgba(10,10,20,.92);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border-radius:16px;border:1px solid rgba(255,255,255,.06);padding:18px;z-index:99;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.weather-pop.open{display:block;animation:fadeIn .2s ease}
.weather-pop .close{position:absolute;top:10px;right:14px;cursor:pointer;color:var(--text3);font-size:18px;transition:.2s}
.weather-pop .close:hover{color:var(--text)}
.w-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.w-item{text-align:center;padding:8px 4px;background:rgba(255,255,255,.03);border-radius:10px}
.w-item .v{font-size:16px;font-weight:600}
.w-item .l{font-size:10px;color:var(--text3)}
.w-fc{display:flex;gap:6px;overflow-x:auto;padding:2px 0}
.w-fc .day{min-width:64px;text-align:center;padding:8px 4px;background:rgba(255,255,255,.03);border-radius:10px;font-size:11px;flex-shrink:0}
.w-fc .day .dn{color:var(--text3);font-size:9px}
.w-fc .day .dt{font-weight:600;margin:2px 0}

/* ===== Floating UI ===== */
.fab{position:fixed;bottom:clamp(60px,8vh,80px);right:clamp(12px,2vw,22px);width:clamp(36px,4vh,44px);height:clamp(36px,4vh,44px);border-radius:50%;background:linear-gradient(135deg,var(--accent),#A78BFA);border:none;color:#fff;font-size:clamp(16px,1.8vh,20px);cursor:pointer;box-shadow:0 4px 20px rgba(139,91,246,.25);transition:all .3s var(--smooth);z-index:50;display:none;align-items:center;justify-content:center}
.fab.show{display:flex}
.fab:hover{transform:translateY(clamp(-2px,-.3vh,-4px))scale(1.05);box-shadow:0 8px 30px rgba(139,91,246,.3)}
.fab:active{transform:scale(.92)!important}
.toast{position:fixed;top:clamp(60px,8vh,80px);left:50%;transform:translateX(-50%)translateY(-8px);background:rgba(139,91,246,.12);border:1px solid rgba(139,91,246,.15);color:var(--text);padding:clamp(6px,.6vh,10px) clamp(14px,2vw,24px);border-radius:var(--radius-sm);font-size:var(--fs-sm);z-index:200;opacity:0;transition:all .35s var(--smooth);pointer-events:none;white-space:nowrap;backdrop-filter:blur(16px)}
.toast.show{opacity:1;transform:translateX(-50%)translateY(0)}
.fav-btn{background:none;border:none;cursor:pointer;font-size:15px;opacity:.25;transition:.2s;padding:2px;line-height:1;flex-shrink:0;margin-left:auto}
.fav-btn:hover{opacity:.6}
.fav-btn.on{opacity:1}
.fav-btn.on::after{content:'⭐'}
.fav-btn::after{content:'☆'}
.fav-panel{position:fixed;bottom:76px;right:18px;width:260px;max-height:320px;background:rgba(10,10,20,.92);backdrop-filter:blur(32px);border-radius:14px;border:1px solid rgba(255,255,255,.06);padding:14px;overflow-y:auto;z-index:51;display:none;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.fav-panel.open{display:block;animation:fadeIn .15s ease}
.fav-panel .title{font-size:13px;font-weight:600;margin-bottom:8px;display:flex;justify-content:space-between}
.fav-panel .item{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;cursor:pointer;transition:.15s;font-size:12px}
.fav-panel .item:hover{background:rgba(255,255,255,.04)}
.fav-panel .empty{font-size:12px;color:var(--text2);text-align:center;padding:12px}
.fav-badge{position:absolute;top:-3px;right:-3px;background:var(--accent3);color:#fff;font-size:8px;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;box-shadow:0 2px 8px rgba(255,91,143,.3)}

/* ===== Offline ===== */
.offline-banner{display:none;position:fixed;top:0;left:0;right:0;background:rgba(255,91,143,.2);border-bottom:1px solid rgba(255,91,143,.2);color:var(--accent3);text-align:center;padding:8px;font-size:12px;z-index:300;font-weight:500}

/* ===== Skeleton & Loading ===== */
.skeleton{background:linear-gradient(90deg,rgba(255,255,255,.03)25%,rgba(124,92,255,.05)50%,rgba(255,255,255,.03)75%);background-size:200%100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:-200%0}100%{background-position:200%0}}
.skel-card{height:80px;margin-bottom:8px;border-radius:8px}
.skel-line{height:12px;margin-bottom:6px;border-radius:4px;width:70%}
.loading{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.06);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== Animated Text ===== */
.text-flow{background:linear-gradient(135deg,var(--accent),var(--pink),var(--cyan),var(--accent2));background-size:300%300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:textFlow 6s ease-in-out infinite}
@keyframes textFlow{0%{background-position:0%50%}25%{background-position:100%0%}50%{background-position:100%100%}75%{background-position:0%100%}100%{background-position:0%50%}}
.text-float{animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.text-gradient{background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));background-size:200%auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:textShimmer 4s linear infinite}
@keyframes textShimmer{0%{background-position:0%center}50%{background-position:100%center}100%{background-position:0%center}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ===== Responsive ===== */
@media(max-width:768px){
.container{padding:20px 22px}
.tool-col{grid-template-columns:1fr}
.tool-sidebar{flex-direction:row;overflow-x:auto;padding-bottom:4px;gap:4px}
.tool-sidebar button{white-space:nowrap;flex-shrink:0;font-size:var(--fs-sm);padding:clamp(6px,.5vh,9px)clamp(10px,.8vw,16px);text-align:center}
.tool-grid{grid-template-columns:1fr 1fr}
.paper-card,.insight-card{min-width:min(280px,80vw)}
.weather-pop{right:10px;width:calc(100vw-20px);top:56px}
.hero-card{padding:16px 18px}
.hero-card .ttl{font-size:16px}
.hero-card .stat .num{font-size:28px}
}
@media(max-width:520px){

.hero-card{padding:14px 16px}
.hero-card .ttl{font-size:15px}

.insight-card{min-width:calc(100vw-28px);max-width:calc(100vw-28px);padding:14px}
.paper-card{min-width:calc(100vw-28px);max-width:calc(100vw-28px);padding:14px}

.bottom-nav .item .ico{font-size:19px}

async function loadPapers(){
const scroll=$('paperScroll');const recent=$('recentPaperScroll');
const cached=CACHE.get('papers');
let papers=null;
try{
const r=await fetch('https://api.openalex.org/works?filter=type:article,primary_location.source.id:S4306504241&sort=publication_date:desc&per_page=12',{signal:AbortSignal.timeout(8000)});
if(r.ok){const d=await r.json();if(d.results&&d.results.length){papers=d.results.map(p=>({title:p.title,source:(p.primary_location?.source?.display_name||'arXiv').slice(0,25),date:(p.publication_date||'').slice(0,7),url:p.doi?'https://doi.org/'+p.doi:'#',authors:(p.authorships||[]).slice(0,2).map(a=>a.author.display_name).join(', '),cat:(p.concepts||[]).slice(0,2).map(c=>c.display_name).join(', '),abs:p.title}));CACHE.set('papers',papers,1800000)}}
catch(e){}
if(!papers){papers=cached||PAPERS_FALLBACK}
renderPapers(scroll,papers);
renderPapers(recent,papers.slice(0,6));
renderPaperSummary(papers);
}
function renderPapers(el,papers){
el.innerHTML=papers.map((p,i)=>'<div class="paper-card card" onclick="window.open(\''+esc(p.url||'#')+'\',\'_blank\')"><div class="ct">'+esc(p.cat||p.source||'AI')+'</div><div class="ptitle">'+esc(p.title)+'</div><div class="psum">'+esc((p.abs||p.title).slice(0,150))+'</div><div class="pmeta"><span>'+esc(p.date||'')+'</span>'+esc(p.authors?' '+p.authors.slice(0,25):'')+'</div></div>').join('');
}
function renderPaperSummary(papers){
const cats={};papers.forEach(p=>{const k=p.cat||'AI';cats[k]=(cats[k]||0)+1});
const top=Object.entries(cats).sort((a,b)=>b[1]-a[1]).slice(0,4);
$('paperSummary').innerHTML=top.map(([k,v]) => '<div class="summary-card"><div class="num">'+v+'</div><div class="lbl">'+esc(k)+'</div></div>').join('')+'<div class="summary-card"><div class="num">'+papers.length+'</div><div class="lbl">总计</div></div>';
$('statsGrid').innerHTML='<div class="summary-card"><div class="num">'+papers.length+'</div><div class="lbl">论文总数</div></div><div class="summary-card"><div class="num">'+Object.keys(cats).length+'</div><div class="lbl">研究方向</div></div><div class="summary-card"><div class="num">'+papers.reduce((s,p)=>Math.max(s,p.date?.slice(0,4)||0),0)+'</div><div class="lbl">最新年份</div></div>';
}

async function loadAutomations(){
const cached=CACHE.get('autos');let tasks=null;
try{const r=await fetch('https://raw.githubusercontent.com/LaskyMY/ai-nav/main/automations.json',{signal:AbortSignal.timeout(5000)});if(r.ok){const d=await r.json();tasks=d.tasks||[];CACHE.set('autos',tasks,300000)}}
catch(e){}
if(!tasks)tasks=cached||[{name:'论文刷新',schedule:'每5分',status:'active',last:'实时'},{name:'天气更新',schedule:'每10分',status:'active',last:'实时'},{name:'Pages部署',schedule:'自动',status:'active',last:'在线'}];
renderAutos($('autoScroll'),tasks);renderAutos($('autoScroll2'),tasks);
$('autoSummary').innerHTML='<div class="summary-card"><div class="num">'+tasks.length+'</div><div class="lbl">任务总数</div></div><div class="summary-card"><div class="num">'+tasks.filter(t=>t.status==='active').length+'</div><div class="lbl">运行中</div></div><div class="summary-card"><div class="num">'+tasks.filter(t=>t.status!=='active').length+'</div><div class="lbl">已暂停</div></div>';
}
function renderAutos(el,tasks){
const dm={active:'green',inactive:'yellow',failed:'red'};
el.innerHTML=tasks.map(t=>'<div class="auto-card card"><div class="top"><span class="dot '+dm[t.status]+'"></span><span class="dname">'+esc(t.name)+'</span></div><div class="info">⏱ '+esc(t.schedule||'')+' · '+esc(t.last||'-')+'</div></div>').join('');
}

let activeCat='';let searchQ='';
function renderTools(q){
searchQ=q!==undefined?q:searchQ;
const cats=[...new Set(TOOLS.map(t=>t.c))];
const filtered=searchQ?TOOLS.filter(t=>t.name.toLowerCase().includes(searchQ)||t.d.includes(searchQ)||t.c.includes(searchQ)):TOOLS;
if(!activeCat||!filtered.some(t=>t.c===activeCat))activeCat='';
const items=activeCat?filtered.filter(t=>t.c===activeCat):filtered;
$('heroNum').textContent=filtered.length;
$('heroLbl').textContent=filtered.length+' 工具 · '+cats.filter(c=>filtered.some(t=>t.c===c)).length+' 分类';
const pick=filtered[Math.floor(Math.random()*filtered.length)]||TOOLS[1];
$('featTitle').textContent=pick.name;$('featDesc').textContent=pick.d;$('heroCard').dataset.url=pick.url;
$('toolSidebar').innerHTML='<button class="'+(activeCat===''?'active':'')+'" onclick="pickCat(\'\')">🏷️ 全部 ('+filtered.length+')</button>'+cats.map(c=>'<button class="'+(activeCat===c?'active':'')+'" onclick="pickCat(\''+c+'\')">'+c+' ('+(filtered.filter(t=>t.c===c).length)+')</button>').join('');
$('toolGrid').innerHTML=items.map(t=>'<div class="tool-card card" onclick="window.open(\''+t.url+'\',\'_blank\')"><div class="top"><span class="emoji">'+t.e+'</span><span class="name">'+t.name+'</span></div><div class="desc">'+t.d+'</div><div class="tags">'+t.t.map(tg=>'<span class="tag">'+tg+'</span>').join('')+'</div></div>').join('');
}
function pickCat(c){activeCat=activeCat===c?'':c;renderTools()}
function searchTools(q){activeCat='';renderTools(q.toLowerCase())}

function renderInsights(){
const cached=CACHE.get('insights');
if(cached){renderInsightCards(cached);return}
CACHE.set('insights',INSIGHTS,86400000);
renderInsightCards(INSIGHTS);
}
function renderInsightCards(data){
$('insightScroll').innerHTML=data.map(c=>'<div class="insight-card card '+c.cls+'"><div class="icat">'+c.cat.split(' ')[0]+esc(c.cat.split(' ').slice(1).join(' '))+'</div><div class="isum">'+esc(c.summary)+'</div><div class="ipapers">'+c.papers.map(p=>'<div class="ipaper" onclick="window.open(\''+p.url+'\',\'_blank\')"><span class="dotw"></span><span class="ititle">'+esc(p.title)+'</span><span class="isrc">'+esc(p.src)+'</span></div>').join('')+'</div></div>').join('');

function loadVersions(){
const list=$('versionList');
if(!list)return;
list.innerHTML='<div style="text-align:center;padding:20px;color:var(--text2);font-size:13px"><span class="loading"></span> 加载版本列表...</div>';
fetch('versions/manifest.json?v='+Date.now()).then(r=>r.ok?r.json():Promise.reject()).then(data=>{
list.innerHTML=data.map((v,i)=>'<div style="background:var(--card);border:1px solid rgba(255,255,255,.035);border-radius:10px;padding:16px;margin-bottom:10px;cursor:pointer" onclick="window.open(\'versions/'+v.id+'-'+v.date.slice(0,10)+'.html\',\'_blank\')" class="card">'+

function getFavs(){try{return JSON.parse(localStorage.getItem('ac_favs'))||[]}catch(e){return[]}}
function setFavs(f){localStorage.setItem('ac_favs',JSON.stringify(f));renderFavs()}
function toggleFav(name,e){
e.stopPropagation();
const favs=getFavs();
const idx=favs.indexOf(name);
if(idx>-1)favs.splice(idx,1);else favs.push(name);
setFavs(favs);
const card=e.target.closest('.tool-card');
if(card){const btn=card.querySelector('.fav-btn');if(btn)btn.classList.toggle('on',idx===-1)}
toast(idx>-1?'已取消收藏:'+name:'已收藏:'+name);
}
function renderFavs(){
const favs=getFavs();
$('favList').innerHTML=favs.length?favs.map(n=>{const t=TOOLS.find(x=>x.name===n);return t?'<div class="item" onclick="window.open(\''+t.url+'\',\'_blank\')">'+t.e+' '+esc(t.name)+'</div>':''}).join(''):'<div class="empty">还没有收藏的工具<br>点击卡片上的☆收藏</div>';
$('favBadge').textContent=favs.length;$('favBadge').style.display=favs.length?'':'none';
$('favFabIcon').textContent=favs.length?'⭐':'☆';
document.querySelectorAll('.tool-card').forEach(card=>{
const name=card.querySelector('.name')?.textContent;
const btn=card.querySelector('.fav-btn');
if(btn&&name)btn.classList.toggle('on',favs.includes(name));
});
}
function toggleFavPanel(){$('favPanel').classList.toggle('open')}

function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200)}

window.addEventListener('scroll',()=>{$('fabTop').classList.toggle('show',window.scrollY>300)})
window.addEventListener('online',()=>{$('offlineBanner').style.display='none';toast('📡 网络已恢复')});
window.addEventListener('offline',()=>{$('offlineBanner').style.display='block'});

document.addEventListener('keydown',e=>{
if(e.key==='/'&&e.target.tagName!=='INPUT'){e.preventDefault();$('searchInput').focus()}
if(e.altKey){const m={1:'overview',2:'papers',3:'tools',4:'auto'};if(m[e.key])switchPage(m[e.key])}
if(e.key==='Escape'){$('weatherPop').classList.remove('open');$('favPanel').classList.remove('open')}
});

document.addEventListener('click',e=>{
if(!e.target.closest('.weather-pop')&&!e.target.closest('.weather-pill'))$('weatherPop').classList.remove('open');
if(!e.target.closest('.fav-panel')&&!e.target.closest('#fabFav'))$('favPanel').classList.remove('open');
});

function showSkeleton(el,count=4){
el.innerHTML=Array(count).fill('<div class="skel-card skeleton"><div class="skel-line skeleton"></div><div class="skel-line skeleton"></div></div>').join('');
}

let _mx=0,_my=0,_lx=0,_ly=0;
document.addEventListener('mousemove',e=>{_mx=e.clientX;_my=e.clientY});
function _follow(){_lx+=(_mx-_lx)*.1;_ly+=(_my-_ly)*.1;
document.documentElement.style.setProperty('--mx',_lx+'px');document.documentElement.style.setProperty('--my',_ly+'px');
requestAnimationFrame(_follow)}_follow();
document.addEventListener('mousemove',e=>{document.querySelectorAll('.card,.hero-card').forEach(el=>{const r=el.getBoundingClientRect();el.style.setProperty('--cx',((e.clientX-r.left)/r.width*100).toFixed(1)+'%');el.style.setProperty('--cy',((e.clientY-r.top)/r.height*100).toFixed(1)+'%')})});

setTimeout(()=>{const s=$('splash');if(s){s.classList.add('hide');setTimeout(()=>{s.style.display='none'},500)}},2000);

showSkeleton($('paperScroll'),4);
showSkeleton($('autoScroll'),3);
