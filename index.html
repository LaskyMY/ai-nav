<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Center · 智能中枢</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🧠</text></svg>">
<style>
:root{--bg:#0a0a14;--card:#13132a;--card2:#1a1a38;--accent:#6c5ce7;--accent2:#00d4aa;--text:#e0e0f0;--muted:#7878a0;--border:#252545;--radius:10px;--shadow:0 4px 20px rgba(0,0,0,.3)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
a{color:var(--accent2);text-decoration:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ===== Header ===== */
header{position:sticky;top:0;z-index:100;background:rgba(10,10,20,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.header-inner{max-width:1400px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.logo{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;display:flex;align-items:center;gap:6px}
.logo-icon{font-size:22px;-webkit-text-fill-color:initial}
.header-right{display:flex;align-items:center;gap:12px;margin-left:auto}
.weather-widget{display:flex;align-items:center;gap:8px;background:var(--card);padding:4px 12px;border-radius:8px;border:1px solid var(--border);font-size:13px;cursor:pointer;transition:.2s}
.weather-widget:hover{border-color:var(--accent)}
.weather-icon{font-size:20px}
.weather-temp{font-weight:600}
.weather-city{color:var(--muted);font-size:12px}
.clock{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}
.clock-num{color:var(--text);font-weight:500}

/* ===== Layout ===== */
.container{max-width:1400px;margin:0 auto;padding:12px 16px;display:grid;grid-template-columns:1fr;gap:12px}

/* ===== Section ===== */
.section{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.section-hd{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none;transition:.2s;border-bottom:1px solid transparent}
.section-hd:hover{background:rgba(108,92,231,.06)}
.section-hd.active{border-bottom-color:var(--border)}
.section-icon{font-size:16px}
.section-title{font-weight:600;font-size:14px;flex:1}
.section-badge{background:var(--accent);color:#fff;font-size:11px;padding:1px 8px;border-radius:10px;font-weight:500}
.section-toggle{font-size:12px;color:var(--muted);transition:transform .3s}
.section-hd.active .section-toggle{transform:rotate(180deg)}
.section-bd{padding:12px 16px;animation:fadeIn .3s ease}

/* ===== Stat Grid ===== */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:12px}
.stat-card{background:var(--card);border-radius:8px;border:1px solid var(--border);padding:10px 12px;text-align:center;transition:.2s}
.stat-card:hover{border-color:var(--accent);background:var(--card2)}
.stat-num{font-size:24px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px}
.stat-sub{font-size:10px;color:var(--muted);opacity:.7}
.stat-num.pulse{animation:pulse 2s infinite;-webkit-text-fill-color:var(--accent2);background:none;color:var(--accent2)}

/* ===== Weather Detail ===== */
.weather-detail{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:12px}
.weather-item{text-align:center;padding:8px;background:var(--card);border-radius:8px;border:1px solid var(--border)}
.weather-item .label{font-size:11px;color:var(--muted)}
.weather-item .val{font-size:16px;font-weight:600;margin-top:2px}
.forecast-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:6px}
.forecast-day{text-align:center;padding:8px 4px;background:var(--card);border-radius:8px;border:1px solid var(--border);font-size:12px}
.forecast-day .name{color:var(--muted)}
.forecast-day .temp{font-weight:600;margin-top:2px}

/* ===== Command Workbench ===== */
.workbench-input-wrap{display:flex;gap:8px;margin-bottom:10px}
.workbench-input{flex:1;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px;outline:none;transition:.2s}
.workbench-input:focus{border-color:var(--accent)}
.workbench-input::placeholder{color:var(--muted)}
.workbench-btn{padding:10px 18px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:600;cursor:pointer;transition:.2s;font-size:13px;white-space:nowrap}
.workbench-btn:hover{opacity:.9;transform:translateY(-1px)}
.quick-actions{display:flex;gap:6px;flex-wrap:wrap}
.quick-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:12px;cursor:pointer;transition:.2s}
.quick-btn:hover{border-color:var(--accent);background:rgba(108,92,231,.1)}
.quick-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.workbench-log{max-height:160px;overflow-y:auto;margin-top:8px;font-size:12px;font-family:monospace;background:var(--bg);border-radius:6px;padding:8px;border:1px solid var(--border)}
.workbench-log .line{color:var(--muted);padding:2px 0}
.workbench-log .line.cmd{color:var(--accent2)}
.workbench-log .line.out{color:var(--text)}
.workbench-log .line.err{color:#ff6b6b}

/* ===== Paper Feed ===== */
.paper-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid rgba(37,37,69,.5);animation:fadeIn .3s ease}
.paper-item:last-child{border-bottom:none}
.paper-num{color:var(--muted);font-size:11px;min-width:20px;padding-top:2px}
.paper-body{flex:1;min-width:0}
.paper-title{font-weight:600;font-size:13px;cursor:pointer;transition:.2s;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.paper-title:hover{color:var(--accent2)}
.paper-meta{font-size:11px;color:var(--muted);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
.paper-source{padding:1px 6px;border-radius:4px;background:rgba(108,92,231,.15);color:var(--accent);font-size:10px}
.paper-abs{font-size:12px;color:var(--muted);margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5}
.paper-loading{text-align:center;padding:20px;color:var(--muted);font-size:13px}

/* ===== Automation Monitor ===== */
.auto-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
.auto-card{background:var(--card);border-radius:8px;border:1px solid var(--border);padding:10px 12px;transition:.2s}
.auto-card:hover{border-color:var(--accent)}
.auto-card .name{font-weight:600;font-size:13px;display:flex;align-items:center;gap:6px}
.auto-card .status-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.auto-card .status-dot.green{background:#00d4aa;box-shadow:0 0 6px rgba(0,212,170,.4)}
.auto-card .status-dot.yellow{background:#ffa500;box-shadow:0 0 6px rgba(255,165,0,.4)}
.auto-card .status-dot.red{background:#ff4757;box-shadow:0 0 6px rgba(255,71,87,.4)}
.auto-card .schedule{font-size:11px;color:var(--muted);margin-top:4px}
.auto-card .last-run{font-size:10px;color:var(--muted);margin-top:2px}

/* ===== Tool Categories ===== */
.cat-group{margin-bottom:6px}
.cat-hd{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;border-radius:6px;transition:.2s;user-select:none}
.cat-hd:hover{background:rgba(108,92,231,.06)}
.cat-hd .icon{font-size:16px}
.cat-hd .name{font-weight:600;font-size:13px;flex:1}
.cat-hd .count{font-size:11px;color:var(--muted)}
.cat-hd .arrow{font-size:10px;color:var(--muted);transition:transform .3s}
.cat-hd.open .arrow{transform:rotate(90deg)}
.cat-bd{display:none;padding:4px 8px 8px 20px;animation:fadeIn .2s ease}
.cat-bd.open{display:block}
.tool-item{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;cursor:pointer;transition:.15s;font-size:13px}
.tool-item:hover{background:rgba(108,92,231,.1)}
.tool-item .emoji{font-size:15px}
.tool-item .name{flex:1;font-weight:500}
.tool-item .desc{font-size:11px;color:var(--muted);flex:0 0 40%;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tool-item .tag{font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(108,92,231,.15);color:var(--accent);white-space:nowrap}

/* ===== Search ===== */
.search-wrap{position:relative;flex:1;min-width:120px}
.search-wrap input{width:100%;padding:8px 12px 8px 32px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;outline:none;transition:.2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap .ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px}

/* ===== Loading ===== */
.loading-spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:12px}

/* ===== Responsive ===== */
@media(max-width:640px){
.header-inner{gap:8px;padding:8px 10px}
.logo{font-size:15px}
.clock{display:none}
.weather-widget{padding:3px 8px;font-size:12px}
.weather-icon{font-size:16px}
.container{padding:8px 10px}
.stat-grid{grid-template-columns:repeat(3,1fr)}
.stat-num{font-size:20px}
.weather-detail{grid-template-columns:repeat(2,1fr)}
.forecast-grid{grid-template-columns:repeat(3,1fr)}
.auto-grid{grid-template-columns:1fr}
.tool-item .desc{flex:0 0 30%}
.paper-meta{font-size:10px}
.workbench-input-wrap{flex-direction:column}
.workbench-btn{width:100%}
.header-right{gap:6px}
}
@media(max-width:400px){
.stat-grid{grid-template-columns:repeat(2,1fr)}
.forecast-grid{grid-template-columns:repeat(2,1fr)}
.tool-item{flex-wrap:wrap}
.tool-item .desc{flex:100%;text-align:left;font-size:10px;margin-left:23px}
}
</style>
</head>
<body>

<header>
<div class="header-inner">
<div class="logo"><span class="logo-icon">🧠</span> AI Center</div>
<div class="search-wrap"><span class="ico">🔍</span><input id="globalSearch" placeholder="搜索工具..." oninput="searchTools(this.value)"></div>
<div class="header-right">
<div class="clock" id="clock">--:--:--</div>
<div class="weather-widget" id="weatherWidget" onclick="toggleSection('weatherSection')">
<span class="weather-icon" id="weatherIcon">☀️</span>
<span><span class="weather-temp" id="weatherTemp">--°</span> <span class="weather-city" id="weatherCity">定位中</span></span>
</div>
</div>
</div>
</header>

<div class="container">

<!-- Stats -->
<div class="stat-grid" id="statGrid"></div>

<!-- Weather Detail -->
<div class="section" id="weatherSection" style="display:none">
<div class="section-bd" id="weatherDetail"></div>
</div>

<!-- AI Command Workbench -->
<div class="section">
<div class="section-hd active" onclick="toggleSection('workbenchBody',this)">
<span class="section-icon">⚡</span>
<span class="section-title">AI 命令工作台</span>
<span class="section-toggle">▼</span>
</div>
<div class="section-bd" id="workbenchBody">
<div class="workbench-input-wrap">
<input class="workbench-input" id="cmdInput" placeholder="输入命令或问题..." onkeydown="if(event.key==='Enter')runCommand()">
<button class="workbench-btn" onclick="runCommand()">执行</button>
</div>
<div class="quick-actions">
<button class="quick-btn" onclick="quickCmd('汇总今天的最新AI论文')">📄 今日论文</button>
<button class="quick-btn" onclick="quickCmd('当前系统状态')">📊 系统状态</button>
<button class="quick-btn" onclick="quickCmd('推荐3个AI工具')">🎯 工具推荐</button>
<button class="quick-btn" onclick="quickCmd('用AI写一段代码')">💻 写代码</button>
<button class="quick-btn" onclick="quickCmd('整理工作思路')">🧠 头脑风暴</button>
<button class="quick-btn" onclick="document.getElementById('cmdLog').innerHTML='';document.getElementById('workbenchLog').style.display='none'">🗑️ 清空</button>
</div>
<div class="workbench-log" id="workbenchLog" style="display:none"></div>
</div>
</div>

<!-- Daily Papers -->
<div class="section">
<div class="section-hd active" onclick="toggleSection('papersBody',this)">
<span class="section-icon">📄</span>
<span class="section-title">每日前沿论文</span>
<span class="section-badge" id="paperBadge">0</span>
<span class="section-toggle">▼</span>
</div>
<div class="section-bd" id="papersBody">
<div class="paper-loading" id="paperLoading"><span class="loading-spinner"></span> 加载最新论文...</div>
<div id="paperList"></div>
</div>
</div>

<!-- Automation Monitor -->
<div class="section">
<div class="section-hd active" onclick="toggleSection('autoBody',this)">
<span class="section-icon">🤖</span>
<span class="section-title">自动化任务监控</span>
<span class="section-badge" id="autoBadge">0</span>
<span class="section-toggle">▼</span>
</div>
<div class="section-bd" id="autoBody">
<div class="paper-loading" id="autoLoading"><span class="loading-spinner"></span> 加载任务状态...</div>
<div class="auto-grid" id="autoList"></div>
</div>
</div>

<!-- AI Navigation -->
<div class="section">
<div class="section-hd active" onclick="toggleSection('navBody',this)">
<span class="section-icon">🧭</span>
<span class="section-title">AI 工具导航</span>
<span class="section-badge" id="navBadge">0</span>
<span class="section-toggle">▼</span>
</div>
<div class="section-bd" id="navBody"></div>
</div>

</div>

<footer style="text-align:center;padding:20px;color:var(--muted);font-size:12px;border-top:1px solid var(--border);margin-top:12px">
AI Center · 数据实时更新 · 自动刷新
</footer>

{name:'飞书AI',e:'📎',d:'飞书内置AI会议纪要/写作',url:'https://www.feishu.cn',c:'办公效率',t:['办公','协作','国产']},

// ====== Utils ======
function $(id){return document.getElementById(id)}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function toggleSection(bodyId,btn){
const body=typeof bodyId==='string'?$(bodyId):bodyId;
const hd=btn||body.previousElementSibling;
if(!body)return;
const isOpen=body.style.display!=='none';
body.style.display=isOpen?'none':'block';
if(hd)hd.classList.toggle('active',!isOpen);
}

// ====== Clock ======
function updateClock(){
const n=new Date();
$('clock').innerHTML=`<span class="clock-num">${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')}:${n.getSeconds().toString().padStart(2,'0')}</span>`;
}
setInterval(updateClock,1000);updateClock();

// ====== Stats ======
function renderStats(){
const cats=[...new Set(TOOLS.map(t=>t.cat))];
const allTags=[...new Set(TOOLS.flatMap(t=>t.tags))];

// ====== Weather ======
async function loadWeather(){
try{
const resp=await fetch('https://wttr.in/?format=j1');
if(!resp.ok)throw new Error('weather fail');
const d=await resp.json();
const cc=d.current_condition[0];
const loc=d.nearest_area[0];
const city=loc.areaName[0].value+', '+loc.country[0].value;
$('weatherIcon').textContent=getWeatherEmoji(cc.weatherCode);
$('weatherTemp').textContent=cc.temp_C+'°';
$('weatherCity').textContent=city;

let html=`<div class="weather-detail">
<div class="weather-item"><div class="label">温度</div><div class="val">${cc.temp_C}°C</div></div>
<div class="weather-item"><div class="label">体感</div><div class="val">${cc.FeelsLikeC}°C</div></div>
<div class="weather-item"><div class="label">湿度</div><div class="val">${cc.humidity}%</div></div>
<div class="weather-item"><div class="label">风速</div><div class="val">${cc.windspeedKmph}km/h</div></div>
<div class="weather-item"><div class="label">能见度</div><div class="val">${cc.visibility}km</div></div>
<div class="weather-item"><div class="label">降水</div><div class="val">${cc.precipMM}mm</div></div>
</div>`;

if(d.weather){
html+='<div class="forecast-grid">';
d.weather.slice(0,5).forEach(w=>{
const date=new Date(w.date.replace('-','/'));
const days=['日','一','二','三','四','五','六'];
html+=`<div class="forecast-day"><div class="name">周${days[date.getDay()]}</div><div class="temp">${w.mintempC}~${w.maxtempC}°</div><div>${getWeatherEmoji(w.hourly[0].weatherCode)}</div></div>`;
});
html+='</div>';
}
$('weatherDetail').innerHTML=html;
}catch(e){
$('weatherCity').textContent='天气获取失败';
$('weatherTemp').textContent='--°';
console.log('Weather error:',e);
}
}

function getWeatherEmoji(code){
const m={'113':'☀️','116':'⛅','119':'☁️','122':'☁️','143':'🌫️','176':'🌦️','179':'🌧️','182':'🌧️','185':'🌧️','200':'⛈️','227':'🌨️','230':'🌨️','248':'🌫️','260':'🌫️','263':'🌦️','266':'🌦️','281':'🌧️','284':'🌧️','293':'🌦️','296':'🌦️','299':'🌧️','302':'🌧️','305':'🌧️','308':'🌧️','311':'🌧️','314':'🌧️','317':'🌧️','320':'🌨️','323':'🌨️','326':'🌨️','329':'🌨️','332':'🌨️','335':'🌨️','338':'🌨️','350':'🧊','353':'🌦️','356':'🌧️','359':'🌧️','362':'🌧️','365':'🌧️','368':'🌨️','371':'🌨️','374':'🌧️','377':'🌧️','386':'⛈️','389':'⛈️','392':'🌨️','395':'🌨️'};
return m[code]||'🌤️';
}

// ====== Papers ======
async function loadPapers(){
try{
$('paperLoading').style.display='flex';
$('paperList').innerHTML='';
const resp=await fetch('https://export.arxiv.org/api/query?search_query=cat:cs.AI+OR+cat:cs.LG+OR+cat:cs.CV&sortBy=submittedDate&sortOrder=descending&max_results=12');
const xml=await resp.text();
const parser=new DOMParser();
const xdoc=parser.parseFromString(xml,'text/xml');
const entries=xdoc.querySelectorAll('entry');
let html='';
let count=0;
entries.forEach(e=>{
const title=e.querySelector('title')?.textContent?.trim().replace(/\s+/g,' ')||'';
const summary=e.querySelector('summary')?.textContent?.trim().replace(/\s+/g,' ')||'';
const id=e.querySelector('id')?.textContent||'';
const published=e.querySelector('published')?.textContent?.slice(0,10)||'';
const authors=[...e.querySelectorAll('author name')].map(a=>a.textContent).slice(0,3).join(', ');
const cats=[...e.querySelectorAll('category')].map(c=>c.getAttribute('term')).filter(c=>c.includes('.')).map(c=>c.split('.').pop()).slice(0,3).join(', ');
if(title&&summary){
count++;
const abs=summary.length>200?summary.slice(0,200)+'...':summary;
html+=`<div class="paper-item">
<div class="paper-num">${count}</div>
<div class="paper-body">
<div class="paper-title" onclick="window.open('${id}','_blank')">${esc(title)}</div>
<div class="paper-meta"><span>${published}</span><span>${esc(authors)}</span>${cats?`<span class="paper-source">${esc(cats)}</span>`:''}</div>
<div class="paper-abs">${esc(abs)}</div>
</div>
</div>`;
}
});
$('paperList').innerHTML=html||'<div style="text-align:center;padding:20px;color:var(--muted)">暂无论文数据</div>';
$('paperBadge').textContent=count;
$('paperLoading').style.display='none';
}catch(e){
$('paperLoading').innerHTML='论文加载失败，点击 <a href="javascript:loadPapers()">重试</a>';
console.log('Papers error:',e);
}
}

// ====== Automations ======
async function loadAutomations(){
try{
// Try local server first, then fallback to sample data
$('autoLoading').style.display='flex';
let data=null;
try{
const resp=await fetch('http://127.0.0.1:9877/api/automations',{signal:AbortSignal.timeout(3000)});
if(resp.ok)data=await resp.json();
}catch(e){}

if(!data){
data=await fetch('https://raw.githubusercontent.com/LaskyMY/ai-nav/main/automations.json',{signal:AbortSignal.timeout(3000)}).then(r=>r.ok?r.json():null);
}

if(data&&data.tasks){
renderAutoList(data.tasks);
$('autoBadge').textContent=data.tasks.length;
}else{
// Mock data
const mock=[{name:'每日论文推送',schedule:'每天 09:00',status:'active',last:'今天 09:00'},{name:'天气数据刷新',schedule:'每30分钟',status:'active',last:'14:00'},{name:'GitHub备份',schedule:'每天 23:00',status:'inactive',last:'昨天 23:00'}];
renderAutoList(mock);
$('autoBadge').textContent=mock.filter(t=>t.status==='active').length;
}
$('autoLoading').style.display='none';
}catch(e){

}
}

function renderAutoList(tasks){
let html='';
tasks.forEach(t=>{
const dot=t.status==='active'?'green':t.status==='inactive'?'yellow':'red';
const st={active:'运行中',inactive:'已暂停',failed:'异常'}[t.status]||t.status;
html+=`<div class="auto-card">
<div class="name"><span class="status-dot ${dot}"></span>${esc(t.name)}</div>
<div class="schedule">⏱ ${esc(t.schedule||'N/A')}</div>
<div class="last-run">上次运行: ${esc(t.last||'N/A')} · ${st}</div>
</div>`;
});
$('autoList').innerHTML=html;
}

// ====== Tools Navigation ======
function renderTools(filter=''){
const cats=[...new Set(TOOLS.map(t=>t.c))];
const filtered=filter?TOOLS.filter(t=>t.name.toLowerCase().includes(filter)||t.d.includes(filter)||t.c.includes(filter)):TOOLS;
const grouped={};
filtered.forEach(t=>{if(!grouped[t.c])grouped[t.c]=[];grouped[t.c].push(t)});

let html='';
cats.forEach(cat=>{
const items=grouped[cat]||[];
const tagColor=(i)=>{
const map={0:'',1:'green',2:'orange',3:'pink'};
const colors=['','green','orange','pink'];
return colors[i%colors.length];
};
html+=`<div class="cat-group">
<div class="cat-hd open" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
<span class="icon">${['💬','💻','🎨','🎬','🎵','🎯','📎'][cats.indexOf(cat)]||'📦'}</span>
<span class="name">${cat}</span>
<span class="count">${items.length}</span>
<span class="arrow">▶</span>
</div>
<div class="cat-bd open">`;
items.forEach(t=>{
const tag=t.t[0]||'';
html+=`<div class="tool-item" onclick="window.open('${t.url}','_blank')">
<span class="emoji">${t.e}</span>
<span class="name">${t.name}</span>
<span class="desc">${t.d}</span>
${tag?`<span class="tag">${tag}</span>`:''}
</div>`;
});
html+=`</div></div>`;
});
$('navBody').innerHTML=html||'<div style="text-align:center;padding:20px;color:var(--muted)">没有匹配的工具</div>';
$('navBadge').textContent=filtered.length;
}

function searchTools(q){
renderTools(q.toLowerCase());
}
