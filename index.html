<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>AI Center</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🧠</text></svg>">
<style>
:root{--bg:#12121A;--card:#1A1A24;--card2:#20202C;--accent:#7C3AED;--accent2:#059669;--accent3:#DC2626;--amber:#D97706;--pink:#EC4899;--cyan:#06B6D4;--text:#F1F1F6;--text2:#9494AA;--text3:#5C5C70;--nav:52px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.05)transparent}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;min-height:100vh;padding-bottom:var(--nav);-webkit-font-smoothing:antialiased}
::selection{background:rgba(124,58,237,.2)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.04);border-radius:4px}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}.bg-orbs{display:none}.splash{display:none!important}}

/* Background orbs - colorful */
.bg-orbs{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.bg-orbs .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.1;will-change:transform}
.bg-orbs .orb:nth-child(1){width:500px;height:500px;background:var(--accent);top:-15%;left:-8%;animation:orb 28s ease-in-out infinite}
.bg-orbs .orb:nth-child(2){width:400px;height:400px;background:var(--pink);bottom:-12%;right:-6%;animation:orb 32s ease-in-out infinite reverse}
.bg-orbs .orb:nth-child(3){width:300px;height:300px;background:var(--cyan);top:45%;left:60%;animation:orb 24s ease-in-out infinite}
.bg-orbs .orb:nth-child(4){width:200px;height:200px;background:var(--accent2);top:20%;right:30%;animation:orb 20s ease-in-out infinite reverse}
@keyframes orb{0%,100%{transform:translate(0,0)scale(1)}25%{transform:translate(35px,-25px)scale(1.05)}50%{transform:translate(-20px,15px)scale(.95)}75%{transform:translate(25px,20px)scale(1.02)}}

/* Splash - shader logo */
.splash{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s}
.splash.hide{opacity:0;pointer-events:none}
.splash-logo{position:relative;width:72px;height:72px;display:flex;align-items:center;justify-content:center;animation:splashLogoIn .8s cubic-bezier(.34,1.56,.64,1) forwards}
.splash-logo .ring{position:absolute;inset:0;border-radius:50%;border:2px solid transparent;background:conic-gradient(from 0deg,var(--accent),var(--pink),var(--cyan),var(--accent2),var(--accent))border-box;-webkit-mask:linear-gradient(#fff 0 0)padding-box,linear-gradient(#fff 0 0);-webkit-mask-composite:destination-out;mask-composite:exclude;animation:spin 3s linear infinite}
.splash-logo .ring:nth-child(2){inset:6px;animation:spin 2s linear infinite reverse;opacity:.6}
.splash-logo .core{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--pink));box-shadow:0 0 20px rgba(124,58,237,.3);animation:pulse 2s ease-in-out infinite}
.splash-title{font-size:24px;font-weight:700;letter-spacing:-.04em;margin-top:16px;background:linear-gradient(135deg,var(--text),rgba(255,255,255,.5));-webkit-background-clip:text;-webkit-text-fill-color:transparent;opacity:0;animation:splashUp .5s ease .25s forwards}
.splash-sub{font-size:12px;color:var(--text2);letter-spacing:3px;text-transform:uppercase;margin-top:6px;opacity:0;animation:splashUp .5s ease .45s forwards}
@keyframes splashLogoIn{0%{transform:scale(.2)rotate(-30deg);opacity:0}100%{transform:scale(1)rotate(0);opacity:1}}
@keyframes splashUp{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(124,58,237,.3)}50%{box-shadow:0 0 40px rgba(124,58,237,.5)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* Header */
header{position:sticky;top:0;z-index:50;background:rgba(18,18,26,.78);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.025);padding:9px 18px}
.header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:12px}
.logo{font-size:16px;font-weight:700;letter-spacing:-.03em;color:var(--text);display:flex;align-items:center;gap:7px;white-space:nowrap;background:linear-gradient(135deg,var(--text),var(--text2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.search-wrap{flex:1;min-width:80px;position:relative}
.search-wrap input{width:100%;padding:8px 14px 8px 34px;border-radius:8px;border:1px solid rgba(255,255,255,.04);background:rgba(255,255,255,.025);color:var(--text);font-size:13px;outline:none;font-family:inherit;transition:border .2s}
.search-wrap input:focus{border-color:rgba(124,58,237,.2)}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap .ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px}
.header-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.clock{font-size:12px;color:var(--text2);font-variant-numeric:tabular-nums}
.weather-pill{display:flex;align-items:center;gap:5px;padding:5px 12px 5px 8px;border-radius:16px;border:1px solid rgba(255,255,255,.035);background:rgba(255,255,255,.02);font-size:12px;cursor:pointer;transition:border .2s}
.weather-pill:hover{border-color:rgba(124,58,237,.15)}

/* Bottom Nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);background:rgba(18,18,26,.82);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(255,255,255,.025);display:flex;justify-content:center;z-index:100}
.bottom-nav .item{flex:1;max-width:84px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:pointer;color:var(--text3);border:none;background:transparent;font-family:inherit;padding:5px 0;transition:color .2s}
.bottom-nav .item .ico{font-size:20px}
.bottom-nav .item .lbl{font-size:9px;font-weight:500;letter-spacing:-.01em}
.bottom-nav .item.active{color:var(--accent)}

/* Container */
.container{max-width:1100px;margin:0 auto;padding:18px;position:relative;z-index:1}
.page{display:none}
.page.active{display:block;animation:pageIn .45s ease}
@keyframes pageIn{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}

/* Hero - cleaned */
.hero-grid{display:grid;grid-template-columns:1fr 1.1fr;gap:12px;margin-bottom:24px}
.hero-feat{background:linear-gradient(135deg,rgba(236,72,153,.04),rgba(124,58,237,.03));border:1px solid rgba(236,72,153,.06);border-radius:10px;padding:18px 20px;cursor:pointer;transition:transform .25s,box-shadow .25s}
.hero-feat:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,58,237,.04)}
.hero-feat .tag{display:inline-block;padding:4px 10px;border-radius:6px;background:linear-gradient(135deg,var(--accent3),var(--pink));font-size:10px;font-weight:600;color:#fff;letter-spacing:.02em}
.hero-feat .title{font-size:17px;font-weight:600;margin:10px 0 4px;letter-spacing:-.02em}
.hero-feat .title .glow{display:inline-block;background:linear-gradient(135deg,var(--text),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:textShift 3s ease-in-out infinite}
@keyframes textShift{0%,100%{background-position:0%50%}50%{background-position:100%50%}}
.hero-feat .desc{font-size:12px;color:var(--text2)}

/* Animated text utility */
.text-flow{background:linear-gradient(135deg,var(--accent),var(--pink),var(--cyan),var(--accent2));background-size:300%300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:textFlow 6s ease-in-out infinite}
@keyframes textFlow{0%{background-position:0%50%}25%{background-position:100%0%}50%{background-position:100%100%}75%{background-position:0%100%}100%{background-position:0%50%}}
.text-float{animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.text-pulse{animation:textPulse 3s ease-in-out infinite}
@keyframes textPulse{0%,100%{opacity:1}50%{opacity:.7}}
.text-shimmer{background:linear-gradient(90deg,var(--text),var(--text2),var(--text));background-size:200%100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:textShimmer 4s linear infinite}
@keyframes textShimmer{0%{background-position:-200%0}100%{background-position:200%0}}

/* Section */
.section-hd{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.section-hd h2{font-size:18px;font-weight:650;letter-spacing:-.03em;animation:fadeIn .5s ease both}
.section-hd .badge{background:rgba(124,58,237,.08);color:var(--accent);font-size:10px;padding:2px 8px;border-radius:6px;font-weight:600}

/* Card Base - iOS rounded */
.card{background:var(--card);border:1px solid rgba(255,255,255,.03);border-radius:10px;transition:transform .2s,border-color .2s}
.card:hover{transform:translateY(-2px);border-color:rgba(124,58,237,.08)}
.card:active{transform:scale(.97)}

/* Insight */
.scroll-x,.paper-scroll,.auto-scroll{display:flex;gap:10px;overflow-x:auto;padding:4px 0 12px}
.scroll-x::-webkit-scrollbar,.paper-scroll::-webkit-scrollbar,.auto-scroll::-webkit-scrollbar{height:3px}
.scroll-x::-webkit-scrollbar-thumb,.paper-scroll::-webkit-scrollbar-thumb,.auto-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.05);border-radius:3px}
.insight-card{min-width:280px;max-width:340px;padding:16px;flex-shrink:0}
.insight-card .cat{font-size:13px;font-weight:650;margin-bottom:8px;display:flex;align-items:center;gap:6px;letter-spacing:-.01em}
.insight-card .sum{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:12px}
.insight-card .plist{display:flex;flex-direction:column;gap:3px}
.insight-card .plist .i{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:12px;transition:background .1s}
.insight-card .plist .i:hover{background:rgba(255,255,255,.03)}
.insight-card .plist .i .d{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.insight-card .plist .i .t{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.insight-card .plist .i .s{font-size:10px;color:var(--text3);flex-shrink:0}
.insight-card.c0 .cat{color:var(--accent)}.insight-card.c1 .cat{color:var(--accent2)}.insight-card.c2 .cat{color:var(--accent3)}.insight-card.c3 .cat{color:var(--amber)}.insight-card.c4 .cat{color:#8B5CF6}

/* Paper */
.paper-card{min-width:260px;max-width:320px;padding:14px;flex-shrink:0;cursor:pointer}
.paper-card .ct{font-size:10px;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.paper-card .pt{font-size:13px;font-weight:600;line-height:1.5;margin-bottom:4px;letter-spacing:-.01em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.paper-card .ab{font-size:12px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.paper-card .pm{font-size:10px;color:var(--text3);margin-top:6px;display:flex;gap:8px}

/* Auto */
.auto-card{min-width:160px;padding:12px 14px;flex-shrink:0}
.auto-card .top{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.auto-card .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.auto-card .dot.g{background:var(--accent2);box-shadow:0 0 6px rgba(5,150,105,.2)}
.auto-card .dot.y{background:var(--amber);box-shadow:0 0 6px rgba(217,119,6,.2)}
.auto-card .nm{font-weight:600;font-size:12px;letter-spacing:-.01em}
.auto-card .info{font-size:11px;color:var(--text2);margin-top:3px}

/* Summary */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:14px}
.summary-card{padding:14px 12px;text-align:center}
.summary-card .num{font-size:24px;font-weight:700;color:var(--accent2);letter-spacing:-.03em;margin-bottom:1px}
.summary-card .lbl{font-size:11px;color:var(--text2)}

/* Subnav */
.subnav{display:flex;gap:4px;overflow-x:auto;padding:2px 0 12px}
.subnav button{padding:5px 12px;border-radius:6px;border:none;background:transparent;color:var(--text3);font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;white-space:nowrap}
.subnav button:hover{background:rgba(255,255,255,.03)}
.subnav button.active{background:rgba(124,58,237,.08);color:var(--accent)}

/* Tools */
.tool-col{display:grid;grid-template-columns:160px 1fr;gap:12px}
.tool-sidebar{display:flex;flex-direction:column;gap:2px}
.tool-sidebar button{padding:8px 12px;border-radius:6px;border:none;background:transparent;color:var(--text2);font-size:13px;font-weight:500;font-family:inherit;text-align:left;cursor:pointer}
.tool-sidebar button:hover{background:rgba(255,255,255,.03)}
.tool-sidebar button.active{background:rgba(124,58,237,.07);color:var(--accent);font-weight:600}
.tool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
.tool-card{padding:14px;cursor:pointer}
.tool-card .top{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.tool-card .emoji{font-size:17px}
.tool-card .nm{font-weight:600;font-size:13px;letter-spacing:-.01em}
.tool-card .desc{font-size:11px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tool-card .tags{display:flex;gap:3px;margin-top:6px;flex-wrap:wrap}
.tool-card .tag{font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,.03);color:var(--text2)}

/* Weather Popover */
.weather-pop{display:none;position:fixed;top:56px;right:16px;width:280px;max-width:calc(100vw-32px);background:rgba(16,16,26,.94);backdrop-filter:blur(24px);border-radius:12px;border:1px solid rgba(255,255,255,.05);padding:16px;z-index:200;box-shadow:0 16px 48px rgba(0,0,0,.3)}
.weather-pop.open{display:block;animation:in .2s ease}
.weather-pop .close{position:absolute;top:8px;right:12px;cursor:pointer;color:var(--text3);font-size:16px}
.w-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.w-item{text-align:center;padding:6px;background:rgba(255,255,255,.03);border-radius:8px}
.w-item .v{font-size:14px;font-weight:600}
.w-item .l{font-size:9px;color:var(--text3)}
.w-fc{display:flex;gap:6px;overflow-x:auto}
.w-fc .day{min-width:56px;text-align:center;padding:6px;background:rgba(255,255,255,.03);border-radius:8px;font-size:10px;flex-shrink:0}
.w-fc .day .dn{color:var(--text3);font-size:9px}
.w-fc .day .dt{font-weight:600;margin:2px 0}

/* Floating UI */
.fab{position:fixed;bottom:64px;right:16px;width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#8B5CF6);border:none;color:#fff;font-size:16px;cursor:pointer;box-shadow:0 4px 16px rgba(124,58,237,.15);z-index:50;display:none;align-items:center;justify-content:center}
.fab.show{display:flex}.fab:hover{transform:scale(1.06)}
.fav-btn{background:none;border:none;cursor:pointer;font-size:14px;opacity:.15;padding:2px;line-height:1;flex-shrink:0;margin-left:auto}
.fav-btn:hover{opacity:.4}.fav-btn.on{opacity:1}.fav-btn.on::after{content:'⭐'}.fav-btn::after{content:'☆'}
.fav-panel{position:fixed;bottom:64px;right:16px;width:240px;max-height:300px;background:rgba(16,16,26,.94);backdrop-filter:blur(24px);border-radius:12px;border:1px solid rgba(255,255,255,.05);padding:12px;overflow-y:auto;z-index:51;display:none;box-shadow:0 16px 48px rgba(0,0,0,.25)}
.fav-panel.open{display:block;animation:in .15s ease}
.fav-panel .title{font-size:12px;font-weight:600;margin-bottom:6px;display:flex;justify-content:space-between}
.fav-panel .item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;cursor:pointer;font-size:11px}
.fav-panel .item:hover{background:rgba(255,255,255,.03)}
.fav-panel .empty{font-size:11px;color:var(--text2);text-align:center;padding:10px}
.fav-badge{position:absolute;top:-3px;right:-3px;background:var(--accent3);color:#fff;font-size:7px;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%)translateY(-8px);background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.12);padding:8px 18px;border-radius:8px;font-size:12px;z-index:200;opacity:0;pointer-events:none;white-space:nowrap;transition:all .25s}
.toast.show{opacity:1;transform:translateX(-50%)translateY(0)}
.offline-banner{display:none;position:fixed;top:0;left:0;right:0;background:rgba(220,38,38,.1);border-bottom:1px solid rgba(220,38,38,.1);color:var(--accent3);text-align:center;padding:6px;font-size:11px;z-index:300;font-weight:500}
.skeleton{background:linear-gradient(90deg,var(--card)25%,rgba(124,58,237,.03)50%,var(--card)75%);background-size:200%100%;animation:shimmer 1.5s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:-200%0}100%{background-position:200%0}}
.loading{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.03);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Responsive */
@media(max-width:768px){
.container{padding:12px}.hero-grid{grid-template-columns:1fr}
.tool-col{grid-template-columns:1fr}.tool-sidebar{flex-direction:row;overflow-x:auto}
.tool-sidebar button{white-space:nowrap;flex-shrink:0;padding:6px 12px;font-size:12px;text-align:center}
.tool-grid{grid-template-columns:1fr 1fr}.insight-card{min-width:240px}.paper-card{min-width:220px}
.weather-pop{right:10px;width:calc(100vw-20px)}
}
@media(max-width:500px){
.container{padding:10px}.tool-grid{grid-template-columns:1fr}
.insight-card{min-width:200px;padding:14px}.paper-card{min-width:190px;padding:12px}
.clock{display:none}.splash-title{font-size:18px}.splash-logo{width:56px;height:56px}
}
@media(prefers-color-scheme:light){
:root{--bg:#F5F5F7;--card:#FFFFFF;--card2:#F9FAFB;--text:#1D1D1F;--text2:#6E6E7A;--text3:#9A9AA6}
.hero-feat,.card{border-color:rgba(124,58,237,.06)!important}
header,.bottom-nav{background:rgba(245,245,247,.7)!important}
}
html{scroll-behavior:smooth}

/* ===== Hero ===== */
.hero-grid{display:grid;grid-template-columns:2.2fr 1fr;gap:14px;margin-bottom:28px}

.hero-feat{background:linear-gradient(135deg,rgba(244,63,94,.05),rgba(139,91,246,.03));border:1px solid rgba(244,63,94,.07);border-top:1px solid rgba(244,63,94,.11);border-radius:14px;padding:20px 24px;cursor:pointer;transition:transform .3s ease,box-shadow .3s;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.hero-feat:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.15)}
.hero-feat .tag{display:inline-block;padding:4px 12px;border-radius:6px;background:linear-gradient(135deg,var(--accent3),var(--accent));font-size:10px;font-weight:600;color:#fff;letter-spacing:.03em}
.hero-feat .title{font-size:18px;font-weight:600;margin:10px 0 4px;letter-spacing:-.02em;color:var(--text)}
.hero-feat .desc{font-size:12px;color:var(--text2);line-height:1.5}

/* ===== Section Header ===== */
.section-hd{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.section-hd h2{font-size:20px;font-weight:650;letter-spacing:-.03em}
.section-hd .badge{background:rgba(139,91,246,.1);color:var(--accent);font-size:10px;padding:3px 10px;border-radius:6px;font-weight:600}

/* ===== Horizontal Scrollers ===== */
.scroll-x{display:flex;gap:12px;overflow-x:auto;padding:4px 0 16px;scroll-snap-type:x mandatory}
.scroll-x::-webkit-scrollbar{height:4px}
.scroll-x::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:4px}
.scroll-x::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.1)}

/* ===== Insight Cards ===== */
.insight-card{min-width:300px;max-width:350px;padding:20px;flex-shrink:0;scroll-snap-align:start}
.insight-card .cat{font-size:13px;font-weight:650;margin-bottom:10px;display:flex;align-items:center;gap:8px;letter-spacing:-.01em}
.insight-card .sum{font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:14px}
.insight-card .plist{display:flex;flex-direction:column;gap:4px}
.insight-card .plist .item{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;cursor:pointer;font-size:12px;transition:background .15s}

/* Reduced motion */
@media(prefers-reduced-motion:reduce){
*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
.bg-orbs{display:none}
.splash{display:none!important}
}

/* ===== Fluid Background ===== */
.bg-orbs{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.bg-orbs .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.15;will-change:transform}
.bg-orbs .orb:nth-child(1){width:min(500px,60vw);height:min(500px,60vw);background:var(--accent);top:-10%;left:-5%;animation:orbFloat 20s ease-in-out infinite}
.bg-orbs .orb:nth-child(2){width:min(400px,50vw);height:min(400px,50vw);background:var(--accent2);bottom:-15%;right:-8%;animation:orbFloat 25s ease-in-out infinite reverse}
.bg-orbs .orb:nth-child(3){width:min(350px,45vw);height:min(350px,45vw);background:var(--accent3);top:40%;left:50%;animation:orbFloat 30s ease-in-out infinite}
.bg-orbs .orb:nth-child(4){width:min(250px,35vw);height:min(250px,35vw);background:var(--amber);top:60%;right:10%;animation:orbFloat 22s ease-in-out infinite reverse}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(30px,-40px) scale(1.1)}50%{transform:translate(-20px,20px) scale(.95)}75%{transform:translate(40px,30px) scale(1.05)}}

/* ===== Splash ===== */
.splash{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s ease,transform .6s ease}
.splash.hide{opacity:0;transform:scale(1.06);pointer-events:none}
.splash-logo{position:relative;width:80px;height:80px;animation:splashLogo .8s var(--spring) forwards}
.splash-logo .ico{font-size:44px;position:relative;z-index:2;filter:drop-shadow(0 0 30px rgba(124,92,255,.3))}
.splash-ring{position:absolute;border-radius:50%;border:1.5px solid rgba(124,92,255,.15);width:100%;height:100%;animation:splashRing 1.2s ease-out forwards}
.splash-ring:nth-child(2){width:150%;height:150%;animation-delay:.2s;border-color:rgba(0,229,160,.1)}
@keyframes splashLogo{0%{transform:scale(.3) rotate(-10deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes splashRing{0%{transform:scale(.2);opacity:.6}100%{transform:scale(2);opacity:0}}
.splash-title{font-size:26px;font-weight:700;margin-top:18px;letter-spacing:-.04em;background:linear-gradient(135deg,#fff,rgba(255,255,255,.6));-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:splashText .8s .3s both}
.splash-sub{font-size:13px;color:var(--text2);margin-top:6px;animation:splashText .8s .6s both;letter-spacing:3px;text-transform:uppercase;font-weight:400}
.splash-loader{position:absolute;bottom:20%;left:50%;transform:translateX(-50%);width:140px;height:2px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden;animation:splashText .6s .8s both}
.splash-loader span{display:block;height:100%;width:0;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));animation:loaderFill 1.4s .3s var(--smooth) forwards}
@keyframes splashText{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}
@keyframes loaderFill{0%{width:0%}100%{width:100%}}

/* ===== Header ===== */
header{position:relative;z-index:10;padding:clamp(8px,1vh,14px) clamp(14px,2vw,24px);background:rgba(8,8,15,.55);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-bottom:1px solid rgba(255,255,255,.03)}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:clamp(8px,1.2vw,16px)}
.logo{font-size:clamp(15px,1.2vw+4px,20px);font-weight:700;letter-spacing:-.03em;display:flex;align-items:center;gap:clamp(4px,.5vw,8px);color:var(--text)}
.logo .ico{font-size:clamp(18px,1.4vw+4px,24px)}
.search-wrap{flex:1;min-width:80px;position:relative}
.search-wrap input{width:100%;padding:clamp(6px,.5vh+2px,9px) clamp(10px,.8vw+4px,16px) clamp(6px,.5vh+2px,9px) clamp(30px,2.5vw+6px,40px);border-radius:var(--radius-sm);border:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.035);color:var(--text);font-size:var(--fs-sm);outline:none;transition:all .3s ease;font-family:inherit}
.search-wrap input:focus{border-color:rgba(139,91,246,.25);box-shadow:0 0 0 4px rgba(139,91,246,.06)}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap .ico{position:absolute;left:clamp(10px,.8vw+4px,14px);top:50%;transform:translateY(-50%);color:var(--text3);font-size:var(--fs-sm);pointer-events:none}
.header-right{display:flex;align-items:center;gap:clamp(6px,.8vw,12px);margin-left:auto}
.weather-pill{display:flex;align-items:center;gap:clamp(4px,.4vw,8px);background:rgba(255,255,255,.035);padding:clamp(4px,.3vh+2px,6px) clamp(10px,.8vw+4px,16px) clamp(4px,.3vh+2px,6px) clamp(8px,.6vw+2px,12px);border-radius:20px;font-size:var(--fs-sm);cursor:pointer;transition:all .3s ease;border:1px solid rgba(255,255,255,.035)}
.weather-pill:hover{border-color:rgba(139,91,246,.15);background:rgba(139,91,246,.05)}
.weather-pill .icon{font-size:clamp(13px,1vw+2px,16px)}
.weather-pill .temp{font-weight:600;color:var(--text)}
.weather-pill .city{color:var(--text2)}
.clock{font-size:var(--fs-sm);color:var(--text2);font-variant-numeric:tabular-nums;letter-spacing:.02em}

/* ===== Bottom Nav ===== */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:rgba(5,5,10,.8);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(255,255,255,.04);display:flex;z-index:100;justify-content:center;padding-bottom:env(safe-area-inset-bottom,0)}
.bottom-nav .item{flex:1;max-width:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--text3);border:none;background:transparent;font-family:inherit;padding:4px 0;transition:all .35s var(--smooth);-webkit-user-select:none;position:relative}
.bottom-nav .item .ico{font-size:20px;transition:transform .35s var(--spring)}
.bottom-nav .item .lbl{font-size:10px;font-weight:500;letter-spacing:-.01em}
.bottom-nav .item.active{color:var(--accent)}
.bottom-nav .item.active .ico{transform:translateY(-2px)}
.bottom-nav .item::after{content:'';position:absolute;bottom:clamp(2px,.3vh,4px);width:clamp(12px,1.5vw,18px);height:clamp(2px,.2vh,3px);border-radius:2px;background:var(--accent);transform:scaleX(0);transition:transform .35s var(--smooth)}
.bottom-nav .item.active::after{transform:scaleX(1)}
.bottom-nav .item:active{opacity:.5}

/* ===== Pages ===== */
.page{display:none;animation:pageIn .5s var(--smooth) both}
.page.active{display:block;position:relative;z-index:1}
@keyframes pageIn{0%{opacity:0;transform:translateY(16px) scale(.98)}100%{opacity:1;transform:translateY(0) scale(1)}}
.container{max-width:1200px;margin:0 auto;padding:16px 20px}

/* ===== Hero ===== */
.hero-grid{display:grid;grid-template-columns:2.2fr 1fr;gap:clamp(8px,1vw,14px);margin-bottom:var(--space-lg)}

.hero-feat{background:linear-gradient(135deg,rgba(251,113,133,.06),rgba(139,91,246,.04));border-radius:var(--radius);padding:var(--space-md);cursor:pointer;position:relative;overflow:hidden;border:1px solid rgba(251,113,133,.06);transition:all .4s var(--smooth)}
.hero-feat:hover{transform:translateY(clamp(-2px,-.4vh-2px,-4px));border-color:rgba(251,113,133,.12)}
.hero-feat .badge{display:inline-block;padding:clamp(3px,.3vh,5px) clamp(8px,.6vw,14px);border-radius:6px;background:linear-gradient(135deg,var(--accent3),var(--accent));font-size:clamp(9px,.6vw+2px,11px);font-weight:600;color:#fff;letter-spacing:.02em}
.hero-feat .title{font-size:var(--fs-md);font-weight:600;margin:clamp(6px,.6vh,12px) 0 clamp(2px,.3vh,5px);letter-spacing:-.02em}
.hero-feat .desc{font-size:var(--fs-sm);color:var(--text2);line-height:1.5}
.hero-feat .arr{font-size:var(--fs-md);text-align:right;margin-top:clamp(-10px,-1vh,-6px);opacity:.25;transition:transform .3s var(--smooth)}
.hero-feat:hover .arr{transform:translateX(4px);opacity:.5}

/* ===== Bento Cards ===== */
.bento-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.bento-card{background:linear-gradient(160deg,rgba(255,255,255,.045),rgba(255,255,255,.01));border:1px solid rgba(255,255,255,.04);border-top:1px solid rgba(255,255,255,.07);border-radius:var(--radius);padding:var(--space-md);transition:all .5s var(--smooth);cursor:default;position:relative;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.12),inset 0 1px 0 rgba(255,255,255,.03),inset 0 -1px 0 rgba(0,0,0,.1)}
.bento-card::before{content:'';position:absolute;inset:-1px;border-radius:calc(var(--radius)+1px);background:radial-gradient(min(280px,80vw) circle at var(--mx,50%) var(--my,50%),rgba(139,91,246,.08) 0%,rgba(52,211,153,.04) 30%,transparent 55%);pointer-events:none;opacity:0;transition:opacity .6s var(--smooth);z-index:0}
.bento-card::after{content:'';position:absolute;inset:0;border-radius:inherit;background:radial-gradient(min(120px,40vw) circle at var(--mx,50%) var(--my,50%),rgba(255,255,255,.06) 0%,transparent 60%);pointer-events:none;opacity:0;transition:opacity .4s var(--smooth);z-index:1}
.bento-card:hover{transform:translateY(clamp(-3px,-.5vh-2px,-6px));border-color:rgba(139,91,246,.12);box-shadow:0 24px 80px rgba(0,0,0,.2),0 0 60px rgba(139,91,246,.04),inset 0 1px 0 rgba(255,255,255,.05)}
.bento-card:hover::before,.bento-card:hover::after{opacity:1}
.bento-card:active{transform:scale(.97)!important;transition-duration:.1s!important}
.bento-card>*{position:relative;z-index:2}
.bento-card.highlight{background:linear-gradient(135deg,rgba(124,92,255,.06),rgba(0,229,160,.03));border-color:rgba(124,92,255,.08)}
.bento-card .label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.bento-card .value{font-size:28px;font-weight:700;letter-spacing:-.03em;color:var(--text);line-height:1.1}
.bento-card .sub{font-size:13px;color:var(--text2);margin-top:4px}
.bento-card .list{display:flex;flex-direction:column;gap:4px;margin-top:8px}
.bento-card .list-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;cursor:pointer;transition:all .2s ease;font-size:12px;color:var(--text2)}
.bento-card .list-item:hover{background:rgba(255,255,255,.04);color:var(--text)}
.bento-card .list-item .dot{width:4px;height:4px;border-radius:50%;background:var(--accent2);flex-shrink:0}
.bento-card .list-item .src{font-size:10px;color:var(--text3);margin-left:auto}

.insight-scroll,.paper-scroll,.auto-scroll{display:flex;gap:10px;overflow-x:auto;padding:4px 0 14px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.insight-scroll::-webkit-scrollbar,.paper-scroll::-webkit-scrollbar,.auto-scroll::-webkit-scrollbar{height:4px}
.insight-scroll::-webkit-scrollbar-thumb,.paper-scroll::-webkit-scrollbar-thumb,.auto-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px}
.insight-scroll::-webkit-scrollbar-thumb:hover,.paper-scroll::-webkit-scrollbar-thumb:hover,.auto-scroll::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.14)}
.paper-card{min-width:300px;max-width:340px;padding:18px;scroll-snap-align:start;flex-shrink:0;cursor:pointer}
.paper-card .cat{font-size:10px;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.paper-card .ptitle{font-size:14px;font-weight:600;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px;letter-spacing:-.01em}
.paper-card .psum{font-size:12px;color:var(--text2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.paper-card .pmeta{font-size:11px;color:var(--text3);margin-top:8px;display:flex;gap:8px}

.auto-card{min-width:180px;padding:14px 16px;flex-shrink:0;scroll-snap-align:start}
.auto-card .top{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.auto-card .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.auto-card .dot.green{background:var(--accent2);box-shadow:0 0 8px rgba(0,229,160,.3)}
.auto-card .dot.yellow{background:var(--orange);box-shadow:0 0 8px rgba(255,159,28,.3)}
.auto-card .dname{font-weight:600;font-size:13px}
.auto-card .info{font-size:11px;color:var(--text2);margin-top:4px}
.auto-card .info span{opacity:.7}

/* ===== Tool Layout ===== */
.tool-col{display:grid;grid-template-columns:180px 1fr;gap:14px}
.tool-sidebar{display:flex;flex-direction:column;gap:3px}
.tool-sidebar button{padding:9px 14px;border-radius:10px;border:none;background:transparent;color:var(--text2);font-size:13px;font-family:inherit;text-align:left;cursor:pointer;transition:all .25s ease;font-weight:500}
.tool-sidebar button:hover{background:rgba(255,255,255,.04);color:var(--text)}
.tool-sidebar button.active{background:rgba(139,91,246,.08);color:var(--accent);font-weight:600}
.tool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.tool-card{padding:14px;cursor:pointer}
.tool-card .top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.tool-card .emoji{font-size:18px}
.tool-card .name{font-weight:600;font-size:14px;letter-spacing:-.01em}
.tool-card .desc{font-size:12px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tool-card .tags{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.tool-card .tag{font-size:10px;padding:3px 8px;border-radius:5px;background:rgba(255,255,255,.04);color:var(--text2);font-weight:500}

/* ===== Sub-nav ===== */
.subnav{display:flex;gap:4px;overflow-x:auto;padding:2px 0 12px}
.subnav button{padding:6px 14px;border-radius:8px;border:none;background:transparent;color:var(--text3);font-size:12px;cursor:pointer;white-space:nowrap;transition:all .25s ease;flex-shrink:0;font-family:inherit;font-weight:500}
.subnav button:hover{background:rgba(255,255,255,.04);color:var(--text2)}
.subnav button.active{background:rgba(139,91,246,.08);color:var(--accent);font-weight:600}

/* ===== Summary grid ===== */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:14px}
.summary-card{padding:14px;text-align:center}
.summary-card .num{font-size:clamp(20px,2.5vw+4px,30px);font-weight:700;color:var(--accent2);letter-spacing:-.03em}
.summary-card .lbl{font-size:12px;color:var(--text2);margin-top:2px}

/* ===== Weather Popover ===== */
.weather-pop{display:none;position:fixed;top:62px;right:20px;width:320px;max-width:calc(100vw - 40px);background:rgba(10,10,20,.92);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border-radius:16px;border:1px solid rgba(255,255,255,.06);padding:18px;z-index:99;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.weather-pop.open{display:block;animation:fadeIn .2s ease}
.weather-pop .close{position:absolute;top:10px;right:14px;cursor:pointer;color:var(--text3);font-size:18px;transition:.2s}
.weather-pop .close:hover{color:var(--text)}
.w-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.w-item{text-align:center;padding:8px 4px;background:rgba(255,255,255,.03);border-radius:10px}
.w-item .v{font-size:16px;font-weight:600}
.w-item .l{font-size:10px;color:var(--text3)}
.w-fc{display:flex;gap:6px;overflow-x:auto}
.w-fc .day{min-width:64px;text-align:center;padding:8px 4px;background:rgba(255,255,255,.03);border-radius:10px;font-size:11px}
.w-fc .day .dn{color:var(--text3);font-size:9px}
.w-fc .day .dt{font-weight:600;margin:2px 0}

/* ===== Floating UI ===== */
.fab{position:fixed;bottom:clamp(60px,8vh,80px);right:clamp(12px,2vw,22px);width:clamp(36px,4vh,44px);height:clamp(36px,4vh,44px);border-radius:50%;background:linear-gradient(135deg,var(--accent),#A78BFA);border:none;color:#fff;font-size:clamp(16px,1.8vh,20px);cursor:pointer;box-shadow:0 4px 20px rgba(139,91,246,.25);transition:all .3s var(--smooth);z-index:50;display:none;align-items:center;justify-content:center}
.fab.show{display:flex}
.fab:hover{transform:translateY(clamp(-2px,-.3vh,-4px)) scale(1.05);box-shadow:0 8px 30px rgba(139,91,246,.3)}
.fab:active{transform:scale(.92)!important}
.toast{position:fixed;top:clamp(60px,8vh,80px);left:50%;transform:translateX(-50%) translateY(-8px);background:rgba(139,91,246,.12);border:1px solid rgba(139,91,246,.15);color:var(--text);padding:clamp(6px,.6vh,10px) clamp(14px,2vw,24px);border-radius:var(--radius-sm);font-size:var(--fs-sm);z-index:200;opacity:0;transition:all .35s var(--smooth);pointer-events:none;white-space:nowrap;backdrop-filter:blur(16px)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== Favorites ===== */
.fav-btn{background:none;border:none;cursor:pointer;font-size:15px;opacity:.25;transition:.2s;padding:2px;line-height:1;flex-shrink:0;margin-left:auto}
.fav-btn:hover{opacity:.6}
.fav-btn.on{opacity:1}
.fav-btn.on::after{content:'⭐'}
.fav-btn::after{content:'☆'}
.fav-panel{position:fixed;bottom:76px;right:18px;width:260px;max-height:320px;background:rgba(10,10,20,.92);backdrop-filter:blur(32px);border-radius:14px;border:1px solid rgba(255,255,255,.06);padding:14px;overflow-y:auto;z-index:51;display:none;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.fav-panel.open{display:block}
.fav-panel .title{font-size:13px;font-weight:600;margin-bottom:8px;display:flex;justify-content:space-between}
.fav-panel .item{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;cursor:pointer;transition:.15s;font-size:12px}
.fav-panel .item:hover{background:rgba(255,255,255,.04)}
.fav-panel .empty{font-size:12px;color:var(--text2);text-align:center;padding:12px}
.fav-badge{position:absolute;top:-3px;right:-3px;background:var(--accent3);color:#fff;font-size:8px;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;box-shadow:0 2px 8px rgba(255,91,143,.3)}

/* ===== Skeleton ===== */
.skeleton{background:linear-gradient(90deg,rgba(255,255,255,.03) 25%,rgba(124,92,255,.05) 50%,rgba(255,255,255,.03) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skel-card{height:80px;margin-bottom:8px}
.skel-line{height:12px;margin-bottom:6px;width:70%}

/* ===== Offline ===== */
.offline-banner{display:none;position:fixed;top:0;left:0;right:0;background:rgba(255,91,143,.2);border-bottom:1px solid rgba(255,91,143,.2);color:var(--accent3);text-align:center;padding:8px;font-size:12px;z-index:300;font-weight:500}

/* ===== Animations ===== */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.loading{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.06);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* Apply bento-card style to all interactive cards */
.insight-card,.paper-card,.auto-card,.tool-card,.summary-card,.weather-item{background:linear-gradient(160deg,rgba(255,255,255,.045),rgba(255,255,255,.01));border:1px solid rgba(255,255,255,.04);border-top:1px solid rgba(255,255,255,.06);border-radius:var(--radius);transition:all .5s var(--smooth);position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,.03)}
.insight-card:hover,.paper-card:hover,.auto-card:hover,.tool-card:hover,.summary-card:hover{transform:translateY(clamp(-2px,-.4vh-2px,-5px));border-color:rgba(139,91,246,.1);box-shadow:0 20px 60px rgba(0,0,0,.18),0 0 40px rgba(139,91,246,.03),inset 0 1px 0 rgba(255,255,255,.04)}
.paper-card:active,.auto-card:active,.tool-card:active{transform:scale(.97)!important;transition-duration:.1s!important}

.insight-card{padding:18px;min-width:300px;max-width:360px;scroll-snap-align:start;flex-shrink:0}
.insight-card .icat{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px;letter-spacing:-.01em}
.insight-card .isum{font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:14px}
.insight-card .ipapers{display:flex;flex-direction:column;gap:3px}

.insight-card.c5 .icat{color:var(--violet)}

/* ===== Text Dynamics ===== */
.text-gradient{background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200% auto;animation:textShimmer 4s linear infinite}
@keyframes textShimmer{0%{background-position:0% center}50%{background-position:100% center}100%{background-position:0% center}}

.text-reveal{overflow:hidden;display:inline-block;vertical-align:top}
.text-reveal span{display:inline-block;animation:textReveal .8s var(--smooth) both}
@keyframes textReveal{0%{opacity:0;transform:translateY(100%) skewY(-3deg)}100%{opacity:1;transform:translateY(0) skewY(0)}}

.text-fade{animation:textFade .6s ease both}
@keyframes textFade{0%{opacity:0;filter:blur(4px)}100%{opacity:1;filter:blur(0)}}

.num-count{display:inline-block;font-variant-numeric:tabular-nums}
.num-count.pulse{animation:numPulse 2s ease-in-out infinite}
@keyframes numPulse{0%,100%{opacity:1}50%{opacity:.6}}

.typing-cursor::after{content:'|';animation:blink 1s step-end infinite;color:var(--accent);font-weight:300}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* Glass edge shine - subtle moving highlight */
.glass-shine{position:relative}
.glass-shine::before{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,.03) 48%,rgba(255,255,255,.06) 50%,rgba(255,255,255,.03) 52%,transparent 70%);background-size:200% 100%;animation:shine 6s ease-in-out infinite;pointer-events:none;z-index:1}
@keyframes shine{0%{background-position:200% 0}100%{background-position:-200% 0}}

async function loadPapers(){
const scroll=$('paperScroll');const recent=$('recentPaperScroll');
const cached=CACHE.get('papers');
let papers=null;
try{
const r=await fetch('https://api.openalex.org/works?filter=type:article,primary_location.source.id:S4306504241&sort=publication_date:desc&per_page=12',{signal:AbortSignal.timeout(8000)});

}catch(e){}
if(!papers){papers=cached||PAPERS_FALLBACK}
renderPapers(scroll,papers);
renderPapers(recent,papers.slice(0,6));
renderPaperSummary(papers);
}

// ====== Animated Number Counter ======
function animateNum(el,target,duration=1200){
if(!el)return;
const start=parseInt(el.textContent.replace(/,/g,''))||0;
const startTime=performance.now();
function tick(now){
const p=Math.min((now-startTime)/duration,1);
const ease=1-Math.pow(1-p,3);
const current=Math.round(start+(target-start)*ease);
el.textContent=current;
if(p<1)requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
}

}
