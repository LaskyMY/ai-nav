<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>AI Center</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🧠</text></svg>">
<style>
:root{--bg:#1C1C1E;--card:#2C2C2E;--card2:#3A3A3C;--card3:#242426;--accent:#0A84FF;--accent2:#30D158;--accent3:#FF375F;--text:#FFFFFF;--text2:#AEAEB2;--text3:#636366;--separator:rgba(255,255,255,.08);--nav-h:50px;--spring:cubic-bezier(.34,1.56,.64,1);--smooth:cubic-bezier(.4,.0,.2,1);--shadow:0 2px 12px rgba(0,0,0,.3)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;min-height:100vh;padding-bottom:calc(var(--nav-h)+20px);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
h1,h2,h3{font-weight:600;letter-spacing:-.02em}
.section-label h2{font-size:22px;font-weight:700;letter-spacing:-.03em}
.section-label .more,.section-label .badge{font-size:12px;font-weight:500;letter-spacing:0}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes glassShimmer{0%{opacity:.3}50%{opacity:.6}100%{opacity:.3}}
@keyframes press{0%{transform:scale(1)}50%{transform:scale(.97)}100%{transform:scale(1)}}

/* Glass base - apply to all cards */
.glass{background:var(--card);backdrop-filter:blur(20px) saturate(1.3);-webkit-backdrop-filter:blur(20px) saturate(1.3);border:1px solid rgba(255,255,255,.06);border-top:1px solid rgba(255,255,255,.1);box-shadow:var(--shadow);transition:all .35s var(--smooth)}
.glass:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.35);border-color:rgba(108,92,231,.2)}
.glass:active{transform:scale(.97);transition-duration:.1s}

/* iOS spring interactions */
.ios-btn{transition:all .3s var(--spring);cursor:pointer;-webkit-user-select:none;user-select:none}
.ios-btn:hover{transform:scale(1.03)}
.ios-btn:active{transform:scale(.95);transition-duration:.08s}

.ios-tap{transition:all .25s var(--smooth)}
.ios-tap:active{transform:scale(.96);transition-duration:.08s}

/* Animated gradient border effect */
.glass-border{position:relative}
.glass-border::before{content:'';position:absolute;inset:-1px;border-radius:inherit;background:linear-gradient(135deg,var(--accent),transparent 40%,var(--accent2) 70%,transparent);opacity:0;transition:opacity .5s var(--smooth);pointer-events:none;z-index:-1}
.glass-border:hover::before{opacity:.4}

/* Page transition */
.page{display:none;animation:pageIn .45s var(--smooth) both}
.page.active{display:block}
@keyframes pageIn{0%{opacity:0;transform:translateY(12px) scale(.98)}100%{opacity:1;transform:translateY(0) scale(1)}}

/* Smooth scroll behavior */
html{scroll-behavior:smooth}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:inline-block;width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}

/* ===== Header ===== */
header{padding:8px 18px;background:var(--bg);border-bottom:1px solid var(--separator);position:sticky;top:0;z-index:90}
.header-inner{gap:10px}
.logo{font-size:20px;font-weight:700;letter-spacing:-.03em;background:none;-webkit-text-fill-color:var(--text);display:flex;align-items:center;gap:6px}
.logo .ico{font-size:22px;-webkit-text-fill-color:initial;animation:float 3s ease-in-out infinite}
.search-wrap input{background:var(--card);border:1px solid var(--separator);border-radius:10px;padding:8px 12px 8px 32px;font-size:13px;font-family:inherit;color:var(--text);transition:all .25s var(--smooth)}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(10,132,255,.15)}
.search-wrap input::placeholder{color:var(--text3)}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:10px}
.logo{font-size:18px;font-weight:800;display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200% auto;animation:shimmer 3s linear infinite}
.logo .ico{font-size:22px;-webkit-text-fill-color:initial;animation:float 3s ease-in-out infinite}
.search-wrap{flex:1;min-width:100px;position:relative}
.search-wrap input{width:100%;padding:7px 10px 7px 30px;border-radius:10px;border:1px solid rgba(255,255,255,.06);background:var(--card);color:var(--text);font-size:12px;outline:none;transition:all .3s var(--smooth);backdrop-filter:blur(20px) saturate(1.3)}
.search-wrap input:focus{border-color:rgba(108,92,231,.3);box-shadow:0 0 20px rgba(108,92,231,.08)}
.search-wrap .ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;pointer-events:none}
.header-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.weather-pill{display:flex;align-items:center;gap:4px;background:var(--card);padding:5px 12px 5px 10px;border-radius:18px;font-size:12px;cursor:pointer;transition:all .3s var(--smooth);box-shadow:var(--shadow)}
.weather-pill:hover{border-color:var(--accent)}
.clock{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}

/* ===== Nav ===== */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:rgba(28,28,30,.98);border-top:1px solid var(--separator);display:flex;z-index:100;justify-content:center;gap:0;padding-bottom:env(safe-area-inset-bottom,0)}
.bottom-nav .item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:pointer;color:var(--text3);border:none;background:transparent;font-family:inherit;padding:3px 0;transition:color .25s var(--smooth);-webkit-user-select:none;user-select:none}
.bottom-nav .item .ico{font-size:22px;transition:transform .25s var(--spring);margin-bottom:-1px}
.bottom-nav .item .lbl{font-size:10px;font-weight:500;letter-spacing:-.01em}
.bottom-nav .item.active{color:var(--accent)}
.bottom-nav .item.active .ico{transform:translateY(-1px)}
.bottom-nav .item:active{opacity:.6;transition-duration:.05s}

/* ===== Pages ===== */
.page{display:none;animation:slideUp .35s ease}
.page.active{display:block}
.container{max-width:1200px;margin:0 auto;padding:12px 16px}

/* ===== Hero Stats ===== */
.hero-grid{display:grid;grid-template-columns:2fr 1fr;gap:10px;margin-bottom:16px}
.hero-main{background:var(--card);border-radius:12px;padding:16px 18px}
.hero-main .lbl{font-size:12px;color:var(--text2);font-weight:500;letter-spacing:0;text-transform:none}
.hero-main .big{font-size:34px;font-weight:700;color:var(--text);line-height:1.1;margin:2px 0}
.hero-main .sub{font-size:13px;color:var(--text2)}
.hero-feat{background:var(--card);border-radius:12px;padding:16px 18px;cursor:pointer}
.hero-feat:hover{transform:translateY(-2px)}
.hero-feat .badge{display:inline-block;padding:3px 10px;border-radius:6px;background:var(--accent);font-size:11px;font-weight:600;color:#fff}
.hero-feat .title{font-size:17px;font-weight:600;margin:8px 0 3px}
.hero-feat .desc{font-size:13px;color:var(--text2);line-height:1.4}
.hero-feat .arr{font-size:16px;text-align:right;margin-top:-6px;color:var(--text3)}

/* ===== Insight Cards ===== */
.insight-scroll{display:flex;gap:12px;overflow-x:auto;padding:4px 0 14px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;margin-bottom:4px}
.insight-card{min-width:300px;max-width:360px;background:var(--card);border-radius:14px;border:1px solid var(--border);padding:16px;scroll-snap-align:start;flex-shrink:0;cursor:default;transition:.25s;backdrop-filter:blur(4px)}
.insight-card:hover{border-color:var(--accent);box-shadow:0 6px 24px rgba(108,92,231,.1)}
.insight-card .icat{font-size:13px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px;color:var(--text);letter-spacing:0;text-transform:none}
.insight-card .isum{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:12px}
.insight-card .ipapers{display:flex;flex-direction:column;gap:4px}
.insight-card .ipaper{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;cursor:pointer;transition:all .2s var(--smooth);font-size:12px;background:rgba(255,255,255,.03)}
.insight-card .ipaper:hover{background:var(--card2)}
.insight-card .ipaper .dotw{width:4px;height:4px;border-radius:50%;background:var(--accent);flex-shrink:0}
.insight-card .ipaper .ititle{flex:1;font-weight:500;color:var(--text);display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.insight-card .ipaper .isrc{font-size:10px;color:var(--text3);white-space:nowrap}
.insight-card .icat-icon{font-size:20px}
.insight-card.c1 .icat{color:var(--accent)}
.insight-card.c2 .icat{color:var(--accent2)}
.insight-card.c3 .icat{color:var(--accent3)}
.insight-card.c4 .icat{color:#FF9F0A}
.insight-card.c5 .icat{color:#BF5AF2}

@media(max-width:640px){
.insight-card{min-width:260px}
.insight-card .isum{font-size:11px}
}

/* ===== Sub-nav ===== */
.subnav{display:flex;gap:6px;overflow-x:auto;padding:2px 0 12px;scroll-snap-type:x mandatory}
.subnav button{padding:6px 14px;border-radius:16px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);color:var(--muted);font-size:12px;cursor:pointer;white-space:nowrap;transition:all .3s var(--smooth);flex-shrink:0;font-family:inherit;backdrop-filter:blur(10px);-webkit-user-select:none;user-select:none}
.subnav button:hover{background:rgba(108,92,231,.1);color:var(--text);transform:translateY(-1px)}
.subnav button:active{transform:scale(.94);transition-duration:.08s}
.subnav button.active{background:linear-gradient(135deg,rgba(108,92,231,.25),rgba(139,124,247,.2));border-color:rgba(108,92,231,.3);color:#fff;font-weight:600}

/* ===== Paper Summary ===== */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;margin-bottom:14px}
.summary-card{background:var(--card);border-radius:10px;border:1px solid var(--border);padding:12px;text-align:center}
.summary-card .num{font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.summary-card .lbl{font-size:11px;color:var(--muted);margin-top:2px}
.summary-card .src{font-size:10px;color:var(--muted);margin-top:4px;opacity:.7}

.paper-scroll{display:flex;gap:10px;overflow-x:auto;padding:4px 0 12px;scroll-snap-type:x mandatory}
.paper-card{min-width:280px;max-width:340px;background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px;scroll-snap-align:start;flex-shrink:0;cursor:pointer;transition:.25s;animation:slideUp .35s ease both}
.paper-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 20px rgba(108,92,231,.1)}
.paper-card .cat{font-size:11px;color:var(--accent);font-weight:600;letter-spacing:0;margin-bottom:6px;text-transform:none}
.paper-card .ptitle{font-size:14px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:var(--text)}
.paper-card .psum{font-size:12px;color:var(--text2);margin-top:6px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.paper-card .pmeta{font-size:11px;color:var(--text3);margin-top:8px;display:flex;gap:10px;flex-wrap:wrap}

/* ===== Tools ===== */
.tool-col{display:grid;grid-template-columns:180px 1fr;gap:14px}
.tool-sidebar{display:flex;flex-direction:column;gap:4px}
.tool-sidebar button{padding:8px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.04);background:rgba(255,255,255,.02);color:var(--muted);font-size:13px;font-family:inherit;text-align:left;transition:all .3s var(--smooth);backdrop-filter:blur(10px);-webkit-user-select:none;user-select:none}
.tool-sidebar button:hover{background:rgba(108,92,231,.1);color:var(--text)}
.tool-sidebar button.active{background:rgba(108,92,231,.15);border-color:rgba(108,92,231,.2);color:var(--accent2);font-weight:600}
.tool-sidebar button:active{transform:scale(.96);transition-duration:.08s}
.tool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;animation:slideUp .25s ease}
.tool-card{background:var(--card);border-radius:10px;border:1px solid var(--border);padding:12px;cursor:pointer;transition:.25s;animation:fadeIn .3s ease both}
.tool-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 15px rgba(108,92,231,.08)}
.tool-card{padding:14px}
.tool-card .top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.tool-card .emoji{font-size:18px}
.tool-card .name{font-weight:600;font-size:14px;color:var(--text)}
.tool-card .desc{font-size:12px;color:var(--text2);line-height:1.4}
.tool-card .tags{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.tool-card .tag{font-size:10px;padding:2px 8px;border-radius:5px;background:var(--card2);color:var(--text2);font-weight:500}

/* ===== Auto ===== */
.auto-scroll{display:flex;gap:8px;overflow-x:auto;padding:4px 0 12px}
.auto-card{min-width:180px;background:var(--card);border-radius:10px;border:1px solid var(--border);padding:12px;flex-shrink:0;transition:.2s}
.auto-card:hover{border-color:var(--accent2)}
.auto-card .top{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.auto-card .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.auto-card .dot.green{background:var(--accent2);box-shadow:0 0 6px rgba(0,212,170,.4)}
.auto-card .dot.yellow{background:#ffa500;box-shadow:0 0 6px rgba(255,165,0,.4)}
.auto-card .dname{font-weight:600;font-size:12px}
.auto-card .info{font-size:10px;color:var(--muted);margin-top:4px}

/* ===== Weather Popover ===== */
.weather-pop{display:none;position:fixed;top:60px;right:16px;width:320px;max-width:calc(100vw - 32px);background:rgba(16,16,36,.95);backdrop-filter:blur(24px);border-radius:14px;border:1px solid var(--border);padding:16px;z-index:99;box-shadow:0 16px 48px rgba(0,0,0,.5)}
.weather-pop.open{display:block;animation:fadeIn .2s ease}
.weather-pop .close{position:absolute;top:8px;right:12px;cursor:pointer;color:var(--muted);font-size:16px}

/* ===== Floating UI ===== */
.fab{position:fixed;bottom:72px;right:16px;width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-size:18px;cursor:pointer;box-shadow:0 4px 16px rgba(108,92,231,.35);transition:.3s;z-index:50;display:none;align-items:center;justify-content:center}
.fab.show{display:flex}
.fab:hover{transform:translateY(-3px);box-shadow:0 6px 24px rgba(108,92,231,.45)}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:rgba(0,212,170,.15);backdrop-filter:blur(16px);border:1px solid rgba(0,212,170,.3);color:var(--accent2);padding:8px 18px;border-radius:10px;font-size:13px;z-index:200;opacity:0;transition:all .35s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(4px)}

/* ===== Skeleton ===== */
.skeleton{background:linear-gradient(90deg,var(--card) 25%,rgba(108,92,231,.08) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
.skel-card{height:80px;margin-bottom:8px}
.skel-line{height:12px;margin-bottom:6px;width:70%}
.skel-line:last-child{width:45%}

/* ===== Favorite ===== */
.hero-card,.hero-main,.hero-feat,.insight-card,.paper-card,.auto-card,.tool-card,.summary-card,.weather-item,.weather-pop,.fav-panel,
.tool-sidebar button,.bottom-nav .item{position:relative;background:var(--card);border:none;border-radius:12px;box-shadow:var(--shadow);transition:all .35s var(--smooth);overflow:hidden}
.hero-card:hover,.hero-main:hover,.hero-feat:hover,.insight-card:hover,.paper-card:hover,.auto-card:hover,.tool-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.4)}

/* Spotlight highlight - mouse tracking */
.lq-spotlight{position:relative;overflow:hidden}
.lq-spotlight::after{content:'';position:absolute;inset:0;border-radius:inherit;background:radial-gradient(circle 180px at var(--mx,50%) var(--my,50%),rgba(255,255,255,.05) 0%,transparent 55%);pointer-events:none;opacity:0;transition:opacity .5s var(--smooth)}
.lq-spotlight:hover::after{opacity:1}

/* iOS tap animation on interactive cards */
.paper-card,.auto-card,.tool-card,.hero-feat,.insight-card .ipaper,.bottom-nav .item,.tool-sidebar button{cursor:pointer;-webkit-user-select:none;user-select:none}
.paper-card:active,.auto-card:active,.tool-card:active,.hero-feat:active,.bottom-nav .item:active,.tool-sidebar button:active{transform:scale(.96)!important;transition-duration:.08s!important}

.fav-btn{background:none;border:none;cursor:pointer;font-size:16px;opacity:.3;transition:.2s;padding:2px;line-height:1;flex-shrink:0}
.fav-btn:hover{opacity:.7}
.fav-btn.on{opacity:1}
.fav-btn.on::after{content:'⭐'}
.fav-btn::after{content:'☆'}
.fav-panel{position:fixed;bottom:72px;right:16px;width:260px;max-height:300px;background:rgba(16,16,36,.95);backdrop-filter:blur(20px);border-radius:14px;border:1px solid var(--border);padding:12px;overflow-y:auto;z-index:51;display:none;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.fav-panel.open{display:block;animation:fadeIn .2s ease}
.fav-panel .title{font-size:13px;font-weight:600;margin-bottom:8px;display:flex;justify-content:space-between}
.fav-panel .item{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;cursor:pointer;transition:.15s;font-size:12px}
.fav-panel .item:hover{background:var(--card)}
.fav-panel .empty{font-size:12px;color:var(--muted);text-align:center;padding:12px}
.fav-badge{position:absolute;top:-4px;right:-4px;background:var(--accent3);color:#fff;font-size:9px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}

/* ===== Offline Banner ===== */
.offline-banner{display:none;position:fixed;top:0;left:0;right:0;background:#ff6b6b;color:#fff;text-align:center;padding:6px;font-size:12px;z-index:300;animation:slideUp .3s ease}

.w-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.w-item{text-align:center;padding:6px 4px;background:var(--card);border-radius:8px;border:1px solid var(--border)}
.w-item .v{font-size:15px;font-weight:600}
.w-item .l{font-size:9px;color:var(--muted)}
.w-fc{display:flex;gap:6px;overflow-x:auto}
.w-fc .day{min-width:64px;text-align:center;padding:8px 4px;background:var(--card);border-radius:8px;border:1px solid var(--border);font-size:11px}
.w-fc .day .dn{color:var(--muted);font-size:9px}
.w-fc .day .dt{font-weight:600;margin:2px 0}

/* ===== Responsive ===== */
@media(max-width:700px){
.hero-grid{grid-template-columns:1fr}
.tool-col{grid-template-columns:1fr}
.tool-sidebar{flex-direction:row;overflow-x:auto;padding-bottom:4px}
.tool-sidebar button{white-space:nowrap;flex-shrink:0;font-size:12px;padding:6px 12px}
.tool-grid{grid-template-columns:1fr 1fr}
.paper-card{min-width:240px}
}
@media(max-width:420px){
.tool-grid{grid-template-columns:1fr}
.paper-card{min-width:200px}
.clock{display:none}
}

/* ===== Splash Screen ===== */
.splash{position:fixed;inset:0;z-index:9999;background:radial-gradient(ellipse at 30% 40%,rgba(108,92,231,.15) 0%,transparent 60%),radial-gradient(ellipse at 70% 60%,rgba(0,212,170,.08) 0%,transparent 50%),var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .45s ease,transform .45s ease;will-change:opacity,transform}
.splash.hide{opacity:0;transform:scale(1.04);pointer-events:none}
.splash-logo{position:relative;width:72px;height:72px;display:flex;align-items:center;justify-content:center;animation:splashLogo .7s cubic-bezier(.34,1.56,.64,1) forwards;will-change:transform,opacity}
.splash-logo .ico{font-size:40px;position:relative;z-index:2;filter:drop-shadow(0 0 20px rgba(108,92,231,.4))}
.splash-ring{position:absolute;border-radius:50%;border:2px solid rgba(108,92,231,.2);width:100%;height:100%;animation:splashRing 1s ease-out forwards;will-change:transform,opacity}
.splash-ring:nth-child(2){width:140%;height:140%;animation-delay:.15s;border-color:rgba(0,212,170,.15)}
.splash-ring:nth-child(3){width:180%;height:180%;animation-delay:.3s;border-color:rgba(108,92,231,.1)}
@keyframes splashLogo{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes splashRing{0%{transform:scale(.3);opacity:.8}100%{transform:scale(1.8);opacity:0}}
.splash-title{font-size:22px;font-weight:800;margin-top:16px;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200% auto;animation:splashText 1s .4s both,shimmer 2s linear infinite;will-change:opacity,transform}
.splash-sub{font-size:12px;color:var(--muted);margin-top:6px;animation:splashText .8s .7s both;letter-spacing:2px;text-transform:uppercase}
@keyframes splashText{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
.splash-dots{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.splash-dot{position:absolute;width:4px;height:4px;border-radius:50%;background:var(--accent);opacity:0;animation:dotFloat 2s ease-in-out infinite}
.splash-dot:nth-child(1){left:20%;top:30%;animation-delay:.1s;background:var(--accent2)}
.splash-dot:nth-child(2){left:70%;top:20%;animation-delay:.4s;width:3px;height:3px}
.splash-dot:nth-child(3){left:40%;top:70%;animation-delay:.7s;background:var(--accent3);width:5px;height:5px}
.splash-dot:nth-child(4){left:80%;top:65%;animation-delay:1s;width:3px;height:3px}
.splash-dot:nth-child(5){left:15%;top:55%;animation-delay:1.3s;background:var(--accent2)}
.splash-dot:nth-child(6){left:60%;top:75%;animation-delay:.55s;width:3px;height:3px}
.splash-dot:nth-child(7){left:85%;top:35%;animation-delay:.85s;background:var(--accent3)}
.splash-dot:nth-child(8){left:30%;top:15%;animation-delay:1.15s;width:3px;height:3px}
@keyframes dotFloat{0%{opacity:0;transform:translateY(0) scale(0)}30%{opacity:.8;transform:translateY(-10px) scale(1)}70%{opacity:.4;transform:translateY(-18px) scale(.8)}100%{opacity:0;transform:translateY(-28px) scale(0)}}
.splash-loader{position:absolute;bottom:18%;left:50%;transform:translateX(-50%);width:120px;height:2px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;animation:splashText .6s 1s both}
.splash-loader span{display:block;height:100%;width:0;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));animation:loaderFill 1.6s .2s cubic-bezier(.4,.0,.2,1) forwards;will-change:width}
@keyframes loaderFill{0%{width:0%}100%{width:100%}}

@media(max-width:640px){
.splash-logo{width:60px;height:60px}
.splash-logo .ico{font-size:32px}
.splash-title{font-size:18px}
.splash-sub{font-size:10px}
.splash-loader{width:100px}
}

}
</style>
</head>

try{const r=await fetch('https://wttr.in/?format=j1');if(!r.ok)throw Error();const d=await r.json();CACHE.set('weather',d,600000);renderWx(d)}

}

// ====== Papers ======
async function loadPapers(){
const scroll=$('paperScroll');const recent=$('recentPaperScroll');
const cached=CACHE.get('papers');
let papers=null;
try{
const r=await fetch('https://api.openalex.org/works?filter=type:article,primary_location.source.id:S4306504241&sort=publication_date:desc&per_page=12',{signal:AbortSignal.timeout(8000)});
if(r.ok){const d=await r.json();if(d.results&&d.results.length){papers=d.results.map(p=>({title:p.title,source:(p.primary_location?.source?.display_name||'arXiv').slice(0,25),date:(p.publication_date||'').slice(0,7),url:p.doi?'https://doi.org/'+p.doi:'#',authors:(p.authorships||[]).slice(0,2).map(a=>a.author.display_name).join(', '),cat:(p.concepts||[]).slice(0,2).map(c=>c.display_name).join(', '),abs:p.title}));CACHE.set('papers',papers,1800000)}}
}catch(e){}
if(!papers){papers=cached||PAPERS_FALLBACK}
renderPapers(scroll,papers);
renderPapers(recent,papers.slice(0,6));
renderPaperSummary(papers);
}
function renderPapers(el,papers){
el.innerHTML=papers.map((p,i)=>'<div class="paper-card" onclick="window.open(\''+esc(p.url||'#')+'\',\'_blank\')" style="animation-delay:'+(i*0.04)+'s"><div class="cat">'+esc(p.cat||p.source||'AI')+'</div><div class="ptitle">'+esc(p.title)+'</div><div class="psum">'+esc((p.abs||p.title).slice(0,150))+'</div><div class="pmeta"><span>'+esc(p.date||'')+'</span>'+esc(p.authors?' by '+p.authors.slice(0,25):'')+'</div></div>').join('');
}
function renderPaperSummary(papers){
const cats={};papers.forEach(p=>{const k=p.cat||'AI';cats[k]=(cats[k]||0)+1});
const top=Object.entries(cats).sort((a,b)=>b[1]-a[1]).slice(0,4);
$('paperSummary').innerHTML=top.map(([k,v]) => '<div class="summary-card"><div class="num">'+v+'</div><div class="lbl">'+esc(k)+'</div><div class="src">最新论文</div></div>').join('')+'<div class="summary-card"><div class="num">'+papers.length+'</div><div class="lbl">总计</div><div class="src">收录论文</div></div>';
$('statsGrid').innerHTML='<div class="summary-card"><div class="num">'+papers.length+'</div><div class="lbl">论文总数</div></div><div class="summary-card"><div class="num">'+Object.keys(cats).length+'</div><div class="lbl">研究方向</div></div><div class="summary-card"><div class="num">'+papers.reduce((s,p)=>Math.max(s,p.date?.slice(0,4)||0),0)+'</div><div class="lbl">最新年份</div></div>';
}

if(!tasks)tasks=cached||[{name:'论文刷新',schedule:'每5分',status:'active',last:'实时'},{name:'天气更新',schedule:'每10分',status:'active',last:'实时'},{name:'Pages部署',schedule:'自动',status:'active',last:'在线'}];

$('autoSummary').innerHTML='<div class="summary-card"><div class="num">'+tasks.length+'</div><div class="lbl">任务总数</div></div><div class="summary-card"><div class="num">'+tasks.filter(t=>t.status==='active').length+'</div><div class="lbl">运行中</div></div><div class="summary-card"><div class="num">'+tasks.filter(t=>t.status!=='active').length+'</div><div class="lbl">已暂停</div></div>';
}
function renderAutos(el,tasks){
const dots={active:'green',inactive:'yellow',failed:'red'};
el.innerHTML=tasks.map(t=>'<div class="auto-card"><div class="top"><span class="dot '+(dots[t.status]||'green')+'"></span><span class="dname">'+esc(t.name)+'</span></div><div class="info">⏱ '+esc(t.schedule||'')+' · 上次: '+esc(t.last||'-')+'</div></div>').join('');
}

// ====== Tools ======
let activeCat='';let searchQ='';
function renderTools(q){
searchQ=q!==undefined?q:searchQ;
const cats=[...new Set(TOOLS.map(t=>t.c))];
const filtered=searchQ?TOOLS.filter(t=>t.name.toLowerCase().includes(searchQ)||t.d.includes(searchQ)||t.c.includes(searchQ)):TOOLS;
if(!activeCat||!filtered.some(t=>t.c===activeCat))activeCat='';
const items=activeCat?filtered.filter(t=>t.c===activeCat):filtered;

$('heroTotal').textContent=filtered.length;
$('heroSub').textContent='覆盖 '+cats.filter(c=>filtered.some(t=>t.c===c)).length+' 个分类';
const pick=filtered[Math.floor(Math.random()*filtered.length)]||TOOLS[1];
$('featTitle').textContent=pick.name;$('featDesc').textContent=pick.d;$('heroFeat').dataset.url=pick.url;

$('toolSidebar').innerHTML='<button class="'+(activeCat===''?'active':'')+'" onclick="pickCat(\'\')">🏷️ 全部 ('+filtered.length+')</button>'+cats.map(c=>'<button class="'+(activeCat===c?'active':'')+'" onclick="pickCat(\''+c+'\')">'+c+' ('+(filtered.filter(t=>t.c===c).length)+')</button>').join('');
$('toolGrid').innerHTML=items.map(t=>'<div class="tool-card" onclick="window.open(\''+t.url+'\',\'_blank\')"><div class="top"><span class="emoji">'+t.e+'</span><span class="name">'+t.name+'</span></div><div class="desc">'+t.d+'</div><div class="tags">'+t.t.map(tg=>'<span class="tag">'+tg+'</span>').join('')+'</div></div>').join('');
}
function pickCat(c){activeCat=activeCat===c?'':c;renderTools()}
function searchTools(q){activeCat='';renderTools(q.toLowerCase())}

// ====== Add spotlight to cards ======
function initSpotlight(){
document.querySelectorAll('.hero-card,.hero-main,.hero-feat,.insight-card,.paper-card,.auto-card,.tool-card,.summary-card,.hero-feat').forEach(el=>el.classList.add('lq-spotlight'));

const origRenderP=renderPapers;

setTimeout(()=>el.querySelectorAll('.paper-card').forEach(c=>c.classList.add('lq-spotlight')),50);

// ====== Favorites ======
function getFavs(){try{return JSON.parse(localStorage.getItem('ac_favs'))||[]}catch(e){return[]}}
function setFavs(f){localStorage.setItem('ac_favs',JSON.stringify(f));renderFavs()}
function toggleFav(name,e){
e.stopPropagation();
const favs=getFavs();
const idx=favs.indexOf(name);
if(idx>-1)favs.splice(idx,1);else favs.push(name);
setFavs(favs);
const card=e.target.closest('.tool-card');
if(card){const btn=card.querySelector('.fav-btn');if(btn)btn.classList.toggle('on',idx===-1)}
toast(idx>-1?'已取消收藏:'+name:'已收藏:'+name);
}
function renderFavs(){
const favs=getFavs();
$('favList').innerHTML=favs.length?favs.map(n=>{const t=TOOLS.find(x=>x.name===n);return t?'<div class="item" onclick="window.open(\''+t.url+'\',\'_blank\')">'+t.e+' '+esc(t.name)+'</div>':''}).join(''):'<div class="empty">还没有收藏的工具<br>点击卡片上的☆收藏</div>';
$('favBadge').textContent=favs.length;$('favBadge').style.display=favs.length?'':'none';
$('favFabIcon').textContent=favs.length?'⭐':'☆';
// Update all cards
document.querySelectorAll('.tool-card').forEach(card=>{
const name=card.querySelector('.name')?.textContent;
const btn=card.querySelector('.fav-btn');
if(btn&&name)btn.classList.toggle('on',favs.includes(name));
});
}
function toggleFavPanel(){$('favPanel').classList.toggle('open')}

// ====== Toast ======
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200)}

// ====== Scroll to top ======
window.addEventListener('scroll',()=>{$('fabTop').classList.toggle('show',window.scrollY>300)})

// ====== Offline detection ======
window.addEventListener('online',()=>{$('offlineBanner').style.display='none';toast('📡 网络已恢复')});
window.addEventListener('offline',()=>{$('offlineBanner').style.display='block'});

// ====== Keyboard shortcuts ======
document.addEventListener('keydown',e=>{
if(e.key==='/'&&e.target.tagName!=='INPUT'){e.preventDefault();$('searchInput').focus()}
if(e.altKey){const m={1:'overview',2:'papers',3:'tools',4:'auto'};if(m[e.key])switchPage(m[e.key])}
if(e.key==='Escape'){$('weatherPop').classList.remove('open');$('favPanel').classList.remove('open')}
});

// ====== Auto close popovers ======
document.addEventListener('click',e=>{
if(!e.target.closest('.weather-pop')&&!e.target.closest('.weather-pill'))$('weatherPop').classList.remove('open');
if(!e.target.closest('.fav-panel')&&!e.target.closest('#fabFav'))$('favPanel').classList.remove('open');
});

renderTools=function(q){
origRender(q);
renderFavs();
// Add fav buttons
document.querySelectorAll('.tool-card').forEach(card=>{
if(!card.querySelector('.fav-btn')){
const btn=document.createElement('button');
btn.className='fav-btn';
btn.title='收藏';
const name=card.querySelector('.name')?.textContent;
if(name){btn.classList.toggle('on',getFavs().includes(name))};
btn.onclick=(e)=>toggleFav(name,e);
card.querySelector('.top').appendChild(btn);
}
});
};

// ====== Skeleton loading ======
function showSkeleton(el,count=4){
el.innerHTML=Array(count).fill('<div class="skel-card skeleton"><div class="skel-line skeleton"></div><div class="skel-line skeleton"></div></div>').join('');
}

// ====== Liquid Glass Spotlight ======
document.addEventListener('mousemove',e=>{
document.querySelectorAll('.lq-spotlight').forEach(el=>{
const r=el.getBoundingClientRect();
const x=((e.clientX-r.left)/r.width*100).toFixed(1);
const y=((e.clientY-r.top)/r.height*100).toFixed(1);
el.style.setProperty('--mx',x+'%');
el.style.setProperty('--my',y+'%');
});
});
